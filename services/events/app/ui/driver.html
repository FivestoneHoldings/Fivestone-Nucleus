<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GateWay — Driver Hub</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0e1526">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#16181b;--paper:#f7f8fb;--line:#d9deea;--green:#16337a;--amber:#a86a1f;--red:#a33327}
*{box-sizing:border-box;margin:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:16px 14px 60px}
.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.mark{font-weight:800;font-size:1.15rem}.mark span{color:var(--green)}
.who{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:#6b6f76;text-transform:uppercase;letter-spacing:.08em}
.card{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.oid{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#6b6f76}
.chip{float:right;font-family:'IBM Plex Mono',monospace;font-size:.65rem;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.chip.assigned{background:#efe9f7;color:#5a3b8a}.chip.in_transit{background:#fdf1e2;color:var(--amber)}
.addr{margin:10px 0 4px;font-size:.95rem;line-height:1.45}
.addr b{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:#8a8e95;display:block}
.items{font-size:.85rem;color:#44474d;margin:8px 0;padding:8px 10px;background:#faf9f6;border-radius:8px}
.contact{font-size:.82rem;margin:6px 0}
.contact a{color:var(--green);font-weight:600;text-decoration:none}
.row{display:flex;gap:8px;margin-top:12px}
button{flex:1;padding:16px 4px;border:none;border-radius:10px;font-family:'Archivo';font-weight:800;font-size:.92rem;color:#fff;cursor:pointer}
button:active{transform:translateY(1px)}
.b-pick{background:var(--amber)}.b-del{background:var(--green)}.b-fail{background:var(--red);flex:.55}
.empty{text-align:center;color:#8a8e95;padding:48px 12px;font-size:.95rem}
.done{opacity:.35;transition:opacity .6s}
.note{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#8a8e95;text-align:center;margin-top:24px}

/* ===== GateWay design core v0.26 ===== */
*{-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:contain}
.gw-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#0e1526;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));box-shadow:0 2px 14px rgba(10,15,30,.28)}
.gw-bar img{height:34px;display:block}
.gw-bar .surf{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8b93a7;
text-transform:uppercase;letter-spacing:.14em}
.gw-dash{display:inline-flex;gap:3px;vertical-align:middle}
.gw-dash i{width:14px;height:5px;border-radius:2px;transform:skewX(-18deg)}
.gw-dash i:nth-child(1){background:#2f6fe0}.gw-dash i:nth-child(2){background:#e8eaf0}.gw-dash i:nth-child(3){background:#d81f2a}
button, .tile, a{transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease}
button:active{transform:scale(.97)}
:focus-visible{outline:3px solid #2f6fe0;outline-offset:2px;border-radius:8px}
.skel{background:linear-gradient(100deg,#e9edf5 40%,#f6f8fc 50%,#e9edf5 60%);background-size:200% 100%;
animation:gwsh 1.2s infinite linear;border-radius:14px}
@keyframes gwsh{to{background-position:-200% 0}}
body{padding-top:76px !important}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.card{border:1px solid #e4e8f2 !important;border-radius:18px !important;
box-shadow:0 3px 16px rgba(20,30,60,.07)}
.card.done{opacity:.45;transform:scale(.985)}
button{border-radius:12px !important;font-weight:800}
.b-del{background:linear-gradient(135deg,#16337a,#1e4292) !important;color:#fff !important;
box-shadow:0 6px 18px rgba(22,51,122,.3)}
#shiftBtn{box-shadow:0 2px 10px rgba(20,30,60,.08)}

.card.cur{border:2px solid #16337a !important;box-shadow:0 8px 26px rgba(22,51,122,.18) !important}
.card:not(.cur):not(.done){opacity:.92}
.stoptag{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;
color:#7a7f87;text-transform:uppercase;margin-bottom:8px}
.stoptag.on{color:#16337a;font-weight:700}
.ready{color:#16337a;font-weight:800;font-size:.88rem;margin:6px 0}
.sched{font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:#a8701f;
font-weight:700;margin:4px 0}
.b-nav{background:#0e1526;color:#fff;display:flex;flex-direction:column;align-items:center;line-height:1.2}
.b-nav .navsub{font-size:.58rem;font-weight:500;opacity:.75;text-transform:uppercase;letter-spacing:.08em}
#runline{font-family:'IBM Plex Mono',monospace;font-size:.64rem;color:#16337a;
font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:-8px 0 14px}

/* v0.49 viewport guard — nothing may exceed the phone's width */
/* overflow-x:hidden on html+body is a documented Safari scroll-breaker
   (body becomes the scroll container; wheel/trackpad can dead-lock).
   clip clips horizontal overflow WITHOUT creating a scroll container. */
html,body{max-width:100%;overflow-x:clip}
@supports not (overflow: clip){html,body{overflow-x:hidden}}
img,svg,video{max-width:100%;height:auto}
*{min-width:0}
.gw-bar{box-sizing:border-box;max-width:100vw}
.catnav{max-width:100%}
pre,code{white-space:pre-wrap;word-break:break-word}

.cash{background:#1f4d3a;color:#a8e6c5;border-radius:11px;padding:10px 13px;font-weight:900;
font-size:.9rem;margin:7px 0;letter-spacing:.01em}
.prepaid{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#7a7f87;margin:6px 0;
letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
<div class="gw-bar"><img src="/static/logo-bar.png" alt="GateWay Dispatch">
<span class="surf">Driver Hub <span class="gw-dash"><i></i><i></i><i></i></span></span></div>

<div class="top">
  <div class="mark" style="display:none">GateWay <span>Driver Hub</span></div>
  <div class="who" id="who">…</div>
</div>
<div id="alertBanner" style="display:none"></div>
<button onclick="toggleHelp()" id="helpBtn" style="width:100%;padding:12px;margin-bottom:12px;background:#fff4e0;border:1.5px solid #f0c88a;color:#8a4b0b;font-weight:800;font-size:.86rem;border-radius:11px;font-family:inherit">🆘 Get help — reach GateWay now</button>
<div id="helpPanel" style="display:none;margin-bottom:14px"></div>
<button onclick="showEarnings()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px solid #dfe4ee;color:#5a5e64;font-weight:700;font-size:.82rem;border-radius:11px;font-family:inherit">💰 My earnings this week</button>
<button onclick="toggleInsights()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px solid #dfe4ee;color:#5a5e64;font-weight:700;font-size:.82rem;border-radius:11px;font-family:inherit">📈 My record — earnings &amp; best hours</button>
<div id="insightsPanel" style="display:none;margin-bottom:14px"></div>
<button onclick="toggleMyDay()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px solid #dfe4ee;color:#5a5e64;font-weight:700;font-size:.82rem;border-radius:11px;font-family:inherit">📜 My day — completed runs</button>
<div id="myDayPanel" style="display:none;margin-bottom:14px"></div>
<button onclick="toggleProfile()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px solid #dfe4ee;color:#5a5e64;font-weight:700;font-size:.82rem;border-radius:11px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px">⭐ My profile — what customers see <span id="profBadge"></span></button>
<div id="profilePanel" style="display:none;margin-bottom:14px"></div>
<div id="earnPanel" style="display:none;margin-bottom:14px"></div>
<div id="runline"></div>
<div id="list"><div class="empty">Loading your route…</div></div>
<p class="note">Tap Picked Up when you have it. Tap Delivered when it's done.<br>GateWay Dispatch · Fivestone Holdings · <a href="/guide/driver" style="color:#16337a">How it works</a></p>
<script src="/static/gw-ui.js"></script>
<script>
const token = location.pathname.split('/').filter(Boolean).pop();
const api = p => `/api/driver/${token}` + p;

/* --- DRIVER HELP (v1.9.28) ---
   A driver alone at a dark address, with a dead car or a hostile customer,
   needs a human immediately — not a form buried three taps deep. Call and text
   are one tap; the structured report is for anything that needs a record.
   Severity is set by the category, not by asking a stressed driver to rate
   their own emergency. */
const HELP_KINDS = [
  ['safety',   '🚨 Safety emergency',              'critical'],
  ['accident', '🚗 Accident or vehicle trouble',   'critical'],
  ['address',  "📍 Can't find / unsafe address",   'urgent'],
  ['customer', '🙍 Problem with the customer',     'urgent'],
  ['kitchen',  '🍳 Problem at the kitchen',        'urgent'],
  ['order',    '🧾 Order is wrong or incomplete',  'normal'],
  ['app',      '📱 Something in the app is broken','normal'],
  ['other',    '💬 Something else',                'normal'],
];
let HQ = null;
async function toggleHelp(){
  const el = document.getElementById('helpPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  el.innerHTML = '<div class="card">Loading…</div>';
  if(HQ === null){
    try{ HQ = await (await fetch(api('/hq'))).json(); }
    catch(e){ HQ = {phone:'', hours:''}; }
  }
  const tel = (HQ.phone||'').replace(/[^0-9+]/g,'');
  const activeOid = (window._DAY && (window._DAY.orders||[])[0] || {}).order_id || '';
  el.innerHTML = `<div class="card">
    ${tel ? `
      <a href="tel:${tel}" style="display:block;text-align:center;background:#16337a;color:#fff;
        padding:15px;border-radius:12px;font-weight:900;text-decoration:none;font-size:1rem">
        📞 Call GateWay now</a>
      <a href="sms:${tel}" style="display:block;text-align:center;background:#fff;color:#16337a;
        border:1.5px solid #c3d0f0;padding:13px;border-radius:12px;font-weight:800;
        text-decoration:none;margin-top:8px;font-size:.9rem">💬 Text GateWay</a>
      ${HQ.hours?`<div style="text-align:center;font-size:.72rem;color:#8a8e95;margin-top:7px">${esc(HQ.hours)}</div>`:''}
      <div style="height:1px;background:#eef0f5;margin:15px 0"></div>`
    : `<div style="background:#fdf6e3;border:1px solid #f0dfb8;border-radius:11px;padding:11px 13px;
        font-size:.8rem;color:#8a6d3b;margin-bottom:13px;line-height:1.45">
        A direct phone line isn't set up yet. Send a report below — it reaches
        GateWay right away and someone will call you back.</div>`}
    <div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;
      text-transform:uppercase;color:#8b93a7;margin-bottom:9px">Report what's happening</div>
    ${HELP_KINDS.map(([k,label,sev])=>`
      <button onclick="sendHelp('${k}','${esc(label).replace(/'/g,"\\'")}')"
        style="width:100%;text-align:left;background:${sev==='critical'?'#fdecec':'#fff'};
        border:1.5px solid ${sev==='critical'?'#f0c0c0':'#dfe4ee'};
        color:${sev==='critical'?'#a83c3c':'#2a2d33'};padding:12px 14px;border-radius:11px;
        font-weight:${sev==='critical'?'800':'700'};font-size:.86rem;margin-bottom:7px;
        font-family:inherit;box-shadow:none">${label}</button>`).join('')}
    ${activeOid?`<div style="font-size:.72rem;color:#8a8e95;text-align:center;margin-top:4px">
      We'll attach order ${esc(activeOid)} automatically.</div>`:''}
  </div>`;
}
async function sendHelp(kind, label){
  const note = await gwPrompt({title: label, multiline:true,
    placeholder:'Anything that helps us help you faster (optional)',
    confirm:'Send to GateWay',
    body:"This goes straight to GateWay. If you're in danger, call 911 first."});
  if(note === null) return;
  const activeOid = (window._DAY && (window._DAY.orders||[])[0] || {}).order_id || '';
  try{
    const r = await fetch(api('/help'), {method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({kind, message: note || '', order_id: activeOid})});
    if(r.ok){
      const d = await r.json();
      gwToast(d.severity === 'critical'
        ? "Sent — GateWay is being alerted right now 🚨"
        : "Sent to GateWay ✓ Someone will follow up.", true);
      document.getElementById('helpPanel').style.display = 'none';
    } else gwToast('Could not send. Please call instead.', false);
  }catch(e){ gwToast('No connection. Please call GateWay directly.', false); }
}
function driverChime(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes = [880, 1174.7];
    notes.forEach((f,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      o.connect(g); g.connect(ctx.destination);
      const t = ctx.currentTime + i*0.14;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.28, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.22);
      o.start(t); o.stop(t+0.24);
    });
  }catch(e){}
}
function requestOrderAlerts(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission().then(paintAlertBanner);
  }
}
function paintAlertBanner(){
  const el = document.getElementById('alertBanner');
  if(!el || !('Notification' in window)) return;
  if(Notification.permission !== 'default'){ el.style.display = 'none'; return; }
  el.innerHTML = `<button onclick="requestOrderAlerts()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px dashed #c3d0f0;color:#16337a;box-shadow:none;font-size:.8rem">🔔 Turn on alerts — never miss a new delivery</button>`;
  el.style.display = '';
}
async function load(){
  const r = await fetch(api('/orders'));
  if(!r.ok){
    let detail = '';
    try{ const j = await r.json(); detail = j.detail || ''; }catch(e){}
    document.getElementById('list').innerHTML =
      `<div class="empty">This day link isn't valid.<br>Ask dispatch for today's link.<br>` +
      `<span style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;opacity:.55">HTTP ${r.status} ${detail}</span></div>`;
    return;
  }
  const d = await r.json();
  window._DAY = d;   // cached for the My-day panel
  if(document.getElementById('myDayPanel').style.display !== 'none') paintMyDay();
  document.getElementById('who').textContent = d.driver;
  const n = (d.orders||[]).length;
  if(typeof LASTN === 'number' && n > LASTN){
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
    document.title = '🔔 New delivery — GateWay';
    setTimeout(()=>{ document.title = 'GateWay — Driver Hub'; }, 8000);
    driverChime();
    if('Notification' in window && Notification.permission === 'granted'){
      const nf = new Notification('New delivery assigned to you', {
        body: 'Open your hub — a new run just landed.',
        tag: 'gw-driver-assignment', requireInteraction: true,
      });
      nf.onclick = () => { window.focus(); nf.close(); };
    }
  }
  LASTN = n;
  HAS_ACTIVE = (d.orders||[]).some(o=>o.status==='in_transit');
  if(!d.orders.length){ document.getElementById('list').innerHTML =
    `<div class="empty" style="padding:56px 20px"><div class="gw-dash" style="justify-content:center;margin-bottom:16px"><i></i><i></i><i></i></div><div style="font-weight:800;font-size:1rem">You're all caught up</div><div style="font-size:.82rem;margin-top:4px">No deliveries assigned yet. When dispatch sends you one, your phone will buzz.</div></div>`; return; }
  let curIdx = d.orders.findIndex(o=>o.status==='in_transit');
  if(curIdx < 0) curIdx = 0;
  const N = d.orders.length;
  document.getElementById('runline').textContent =
    N > 1 ? `RUN · ${N} STOPS · NOW ON STOP ${curIdx+1}` : '';
  document.getElementById('list').innerHTML = d.orders.map((o, i) => {
    const cur = (i === curIdx) && N > 0;
    const toKitchen = o.status === 'assigned';
    const dest = toKitchen ? o.pickup : o.dropoff;
    return `
    <div class="card ${cur?'cur':''}" id="${o.id}">
      ${N>1?`<div class="stoptag ${cur?'on':''}">${cur?'▶ CURRENT · ':''}STOP ${i+1} OF ${N}</div>`:''}
      <span class="chip ${o.status}">${o.status.replace('_',' ')}</span>
      <div class="oid">${esc(o.order_id)}</div>
      ${o.kitchen_ready?`<div class="ready">🍳 Kitchen says READY</div>`:''}
      ${o.collect_cash_cents ? `<div class="cash">💵 COLLECT $${(o.collect_cash_cents/100).toFixed(2)} CASH at the door</div>` : `<div class="prepaid">✓ Prepaid — nothing to collect</div>`}
      ${o.requested_for?`<div class="sched">SCHEDULED · ${esc(o.requested_for).replace('T',' ').slice(0,16)}</div>`:''}
      <div class="addr"><b>Pickup</b>${esc(o.pickup)||'—'}</div>
      <div class="addr"><b>Dropoff</b>${esc(o.dropoff)||'—'}</div>
      ${o.items?`<div class="items">${fmtItems(o.items)}</div>`:''}
      ${(o.contact||o.phone)?`<div class="contact">${esc(o.contact)||'Customer'}${o.phone?` · <a href="tel:${esc(o.phone).replace(/[^0-9+]/g,'')}">${esc(o.phone)}</a>`:''}</div>`:''}
      ${o.notes?`<div class="items">📝 ${esc(o.notes)}</div>`:''}
      <div class="row">
        ${dest?`<button class="b-nav" data-d="${esc(dest)}" onclick="nav(this.dataset.d)">Navigate ▸<span class="navsub">${toKitchen?'to the kitchen':'to the customer'}</span></button>`:''}
        ${o.status==='assigned'?`<button class="b-pick" onclick="act('${o.id}','picked_up')">Picked Up</button>`:''}
        ${o.status==='in_transit'?`<button class="b-del" onclick="deliver('${o.id}','${o.order_id}')">Delivered ✓</button>`:''}
        ${o.status==='in_transit'?`<button class="b-note" onclick="headsUp('${o.id}')" style="background:transparent;border:1.5px solid #c7c3ba;color:#5a5e64;border-radius:10px;padding:10px;font-size:.78rem">Heads-up ▸</button>`:''}
        <button class="b-note" onclick="addNote('${o.id}')" style="background:transparent;border:1.5px solid #c7c3ba;color:#5a5e64;border-radius:10px;padding:10px;font-size:.78rem">Note</button>
        <button class="b-fail" onclick="fail('${o.id}')">Problem</button>
      </div>
    </div>`}).join('');
}
const DRIVER_AVATARS = ['😎','🚗','🧢','🕶️','🤠','🥳','😊','🙂','👩','👨','🧔','🦊','🐻','🦁','🌟','🔥','💙','🧡','🛵'];
let PROFILE = null;
async function toggleInsights(){
  const el = document.getElementById('insightsPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display=''; el.innerHTML = '<div class="card">Loading your record…</div>';
  try{
    const d = await (await fetch(api('/insights'))).json();
    el.innerHTML = '<div class="card"><div id="insightsBody"></div></div>';
    gwInsights.render(document.getElementById('insightsBody'), d, {hideRevenue:true, showTips:true});
  }catch(e){ el.innerHTML = '<div class="card">Couldn\u2019t load your record. Try again.</div>'; }
}
function toggleMyDay(){
  const el = document.getElementById('myDayPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display=''; paintMyDay();
}
function paintMyDay(){
  const el = document.getElementById('myDayPanel');
  const d = window._DAY || {};
  const list = d.done_list || [];
  const money = c => '$' + (Math.max(0,c||0)/100).toFixed(2);
  const t = iso => { try{ return new Date(iso).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } };
  if(!list.length){
    el.innerHTML = `<div class="card" style="text-align:center;padding:26px 16px">
      <div style="font-size:1.6rem;margin-bottom:8px">🌅</div>
      <div style="font-weight:800">Nothing completed yet today</div>
      <div style="font-size:.8rem;color:#8a8e95;margin-top:4px">Every run you finish shows up here — your day, at a glance.</div></div>`;
    return;
  }
  const tips = list.reduce((a,x)=>a+(x.tip_cents||0),0);
  el.innerHTML = `<div class="card">
    <div style="display:flex;justify-content:space-around;text-align:center;padding-bottom:12px;border-bottom:1px solid #eef0f5;margin-bottom:10px">
      <div><b style="font-size:1.3rem;color:#16337a">${list.length}</b><div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:#8a8e95;font-weight:700">Runs</div></div>
      <div><b style="font-size:1.3rem;color:#1a7f4b">${money(tips)}</b><div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:#8a8e95;font-weight:700">Tips today</div></div>
    </div>
    ${list.map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f2f4f8">
      <div style="min-width:0">
        <div style="font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((x.dropoff||'').split(',')[0] || x.order_id)}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#9199a8">${esc(x.order_id)}${x.delivered_at?` · ${t(x.delivered_at)}`:''}</div>
      </div>
      <div style="flex:0 0 auto;text-align:right">

function nav(addr){
  if(!addr) return;
  const q = encodeURIComponent(addr);
  const ua = navigator.userAgent || '';
  // Apple Maps only opens on Apple devices; every Android driver got a dead
  // link before. Route by platform, with a universal Google Maps fallback that
  // works on Android, desktop, and any browser.
  let url;
  if(/iPhone|iPad|iPod|Macintosh/.test(ua)){
    url = 'https://maps.apple.com/?daddr=' + q;
  } else {
    url = 'https://www.google.com/maps/dir/?api=1&destination=' + q;
  }
  window.open(url, '_blank', 'noopener');
}
async function headsUp(id){
  const presets = ['On my way now 🚗','About 5 minutes out','Running a few minutes late, sorry!','I\'m outside 👋'];
  const pick = await gwPrompt({title:'Send the customer a heads-up', multiline:true,
    placeholder: presets.join('  ·  '), confirm:'Send',
    body:'They\'ll see this on their tracking page. Tap a suggestion or write your own:\n\n• ' + presets.join('\n• ')});
  if(!pick) return;
  const r = await fetch(api(`/orders/${id}/heads-up`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({note: pick})});
  gwToast(r.ok ? 'Sent to the customer ✓' : 'Could not send.', r.ok);
}
let SHIFT = false; let LASTN;
let LAST_STATS = {done_today:0, tips_today_cents:0};
function doneText(d){

                driver: d.driver||''};

  return t;
}
function esc(x){ const d=document.createElement('div'); d.textContent=x||''; return d.innerHTML; }
// Clean per-line items on the delivery card, quantity broken out — a driver
// double-checking the bag at the door reads a list, not a run-on string.
function fmtItems(raw){
  if(!raw) return '';
  let s = String(raw).split(' — subtotal')[0];
  return s.split(/,\s*(?=\d+\s*[×xX])/).map(p=>{
    const m = p.match(/^\s*(\d+)\s*[×xX]\s*(.+?)(?:\s*\(\$[\d.]+\))?\s*$/);
    if(m) return `<div><b style="font-family:'IBM Plex Mono',monospace;color:#16337a">${esc(m[1])}×</b> ${esc(m[2].trim())}</div>`;
    return `<div>${esc(p.trim())}</div>`;
  }).join('');
}
function paintShift(){

    <div style="display:flex;gap:16px;justify-content:center;margin-bottom:18px">

        <div style="font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:#a8c0ee">Deliveries</div></div>
      <div><div style="font-size:2.6rem;font-weight:900;line-height:1">$${(s.tips_today_cents/100).toFixed(0)}</div>

    </div>

    <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;padding:14px;border-radius:13px;border:none;background:#fff;color:#16337a;font-weight:800;font-family:inherit">Done for the day ✓</button>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:.54rem;color:#6b82b4;margin-top:12px;letter-spacing:.08em">SCREENSHOT TO REMEMBER TODAY · GATEWAY</div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });

function gps(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res({});
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude, lng:p.coords.longitude}),
      ()=>res({}), {timeout:3000, maximumAge:60000});
  });
}
async function act(id, action, body){
  const loc = await gps();
  const r = await fetch(api(`/orders/${id}/${action}`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({...(body||{}), ...loc})});
  if(r.ok){ const c=document.getElementById(id); c.classList.add('done');
    setTimeout(load, 700); }
  else {
    let d=''; try{ d=(await r.json()).detail||''; }catch(e){}
    gwToast(d || 'Could not update — try again or call dispatch.', false);
  }
}
async function addNote(id){
  const text = await gwPrompt({title:'Note for dispatch', multiline:true,
    placeholder:'e.g. gate code 4412 worked · customer asked for 6pm', confirm:'Log note'});
  if(!text) return;
  const r = await fetch(api(`/orders/${id}/note`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})});
  gwToast(r.ok ? 'Note logged ✓' : 'Could not save note.', r.ok);
}
function deliver(id, orderId){
  // Offer proof photo; skipping is allowed (v0 grace)
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  let fired = false;
  inp.onchange = async ()=>{
    fired = true;
    const f = inp.files[0];
    if(f){
      const b64 = await shrink(f);
      const loc = await gps();
      await fetch(api(`/orders/${id}/proof`), {method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({image_b64:b64, order_id:orderId, ...loc})}).catch(()=>{});
    }
    act(id, 'delivered');
  };
  // If picker is cancelled, still allow delivery after a beat
  inp.addEventListener('cancel', ()=>{ if(!fired) act(id,'delivered'); });
  inp.click();
}
function shrink(file){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 1280, sc = Math.min(1, max/Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = img.width*sc; cv.height = img.height*sc;
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      res(cv.toDataURL('image/jpeg', 0.72).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}
async function fail(id){
  const reason = await gwPrompt({title:'What happened?', multiline:true,
    placeholder:'No answer · wrong address · refused…', confirm:'Report problem', danger:true});
  if(reason!==null) act(id, 'failed', {reason});
}
function netDown(){
  if(document.getElementById('netB')) return;
  const b = document.createElement('div'); b.id = 'netB';
  b.textContent = '⚠ Connection lost — retrying…';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d81f2a;color:#fff;font-weight:800;text-align:center;padding:8px;z-index:99;font-size:.8rem';
  document.body.prepend(b);
}
function netUp(){ const b = document.getElementById('netB'); if(b) b.remove(); }
const _rawLoad = load;
load = async function(){ try { await _rawLoad(); netUp(); } catch(e) { netDown(); } };
load();

// Continuous location ping while actively delivering (in_transit orders present)
let HAS_ACTIVE = false;
async function pingLoc(){
  if(!HAS_ACTIVE || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async p=>{
    await fetch(api('/ping'), {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({lat:p.coords.latitude, lng:p.coords.longitude})}).catch(()=>{});
  }, ()=>{}, {enableHighAccuracy:true, timeout:8000, maximumAge:30000});
}
setInterval(pingLoc, 45000);
