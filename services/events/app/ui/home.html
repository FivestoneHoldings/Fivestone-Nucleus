<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateWay Delivery</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1526">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#16181b;--paper:#f7f8fb;--green:#16337a;--red:#d81f2a;--mint:#3ecf8e;--line:#d9deea;--dim:#5a5e64}
*{box-sizing:border-box;margin:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);
max-width:460px;margin:0 auto;padding:40px 22px 60px;min-height:100vh}
.mark{font-weight:900;font-size:2rem;letter-spacing:-.02em}
.mark span{color:#d81f2a}
.sub{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);
text-transform:uppercase;letter-spacing:.1em;margin:4px 0 34px}
.tile{display:block;background:#fff;border:1.5px solid var(--line);border-radius:16px;
padding:20px;margin-bottom:14px;text-decoration:none;color:var(--ink);transition:transform .06s}
.tile:active{transform:scale(.985)}
.tile.primary{background:var(--green);color:#fff;border-color:var(--green)}
.tile h2{font-size:1.15rem;font-weight:800;margin-bottom:3px}
.tile p{font-size:.82rem;color:var(--dim);line-height:1.45}
.tile.primary p{color:#c3d0f0}
.arrow{float:right;font-size:1.3rem;margin-top:8px}
.gate{margin-top:26px;border-top:1.5px solid var(--line);padding-top:20px}
.gate h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:10px;font-weight:800}
.row{display:flex;gap:8px;margin-bottom:12px}
input{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--line);
font-family:'IBM Plex Mono',monospace;font-size:.85rem;background:#fff}
button{padding:12px 18px;border-radius:10px;border:none;background:var(--green);
color:#fff;font-weight:800;font-family:'Archivo';cursor:pointer}
.foot{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#9a9ea5;margin-top:34px;
text-transform:uppercase;letter-spacing:.08em;text-align:center}
</style>
</head>
<body>
<div class="mark">Gate<span>Way</span></div>
<div class="sub">Delivery · Blount &amp; Knox County TN</div>

<a class="tile primary" href="/order">
  <span class="arrow">→</span>
  <h2>Place an order</h2>
  <p>Pickup and delivery, straight from us — no middleman.</p>
</a>
<div id="restaurants"></div>

<div class="tile" style="padding-bottom:14px">
  <h2>Track an order</h2>
  <p style="margin-bottom:10px">Enter the order number from your confirmation or text.</p>
  <div class="row" style="margin:0">
    <input id="trk" placeholder="ORD-XXXXXXXX" autocapitalize="characters">
    <button onclick="goTrack()">Track</button>
  </div>
</div>

<div class="gate">
  <h3>GateWay team</h3>
  <div class="row">
    <input id="drv" placeholder="Driver day code">
    <button onclick="go('driver','drv')">Drive</button>
  </div>
  <div class="row">
    <input id="brd" placeholder="Dispatch key">
    <button onclick="go('board','brd')">Board</button>
  </div>
</div>

<div class="foot">GateWay Delivery · Fivestone Holdings<br>Built on Nucleus</div>
<script>
try{
  const lastO = localStorage.getItem('gw_last_order');
  const lastP = JSON.parse(localStorage.getItem('gw_last_partner')||'null');
  let quick = '';
  if(lastP && lastP.code) quick += `<a class="tile" href="/order?partner=${encodeURIComponent(lastP.code)}" style="padding:15px 20px;border-color:#16337a">
    <span class="arrow" style="margin-top:2px">↻</span>
    <h2 style="font-size:1rem">Order again — ${(lastP.name||'').replace(/</g,'&lt;')}</h2>
    <p style="margin:0">Jump back to their menu</p></a>`;
  if(lastO) quick += `<a class="tile" href="/track/${encodeURIComponent(lastO)}" style="padding:15px 20px">
    <span class="arrow" style="margin-top:2px">→</span>
    <h2 style="font-size:1rem">Track my last order</h2>
    <p style="margin:0;font-family:'IBM Plex Mono',monospace;font-size:.72rem">${lastO.replace(/</g,'&lt;')}</p></a>`;
  if(quick) document.getElementById('restaurants').insertAdjacentHTML('beforebegin', quick);
}catch(e){}
fetch('/v0/partners').then(r=>r.json()).then(d=>{
  if(!d.partners || !d.partners.length) return;
  document.getElementById('restaurants').innerHTML =
    '<h3 style="font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:#5a5e64;margin:4px 0 10px;font-weight:800">Order from a local kitchen</h3>' +
    d.partners.map(p=>`<a class="tile" href="/order?partner=${encodeURIComponent(p.code)}" style="padding:15px 20px">
      <span class="arrow" style="margin-top:2px">→</span>
      <h2 style="font-size:1rem">${p.display_name.replace(/</g,'&lt;')}</h2>
      <p style="margin:0">Browse the menu · delivered by GateWay</p></a>`).join('');
}).catch(()=>{});
function go(path, id){
  const v = document.getElementById(id).value.trim();
  if(!v) return;
  try{ localStorage.setItem('gw_'+id, v); }catch(e){}
  location.href = '/' + path + '/' + encodeURIComponent(v);
}
try{
  for(const id of ['drv','brd']){
    const saved = localStorage.getItem('gw_'+id);
    if(saved) document.getElementById(id).value = saved;
  }
}catch(e){}
function goTrack(){
  let v = document.getElementById(trk.id||'trk').value.trim().toUpperCase();
  if(!v) return;
  if(!v.startsWith('ORD-') && v.length===8) v = 'ORD-' + v;
  location.href = '/track/' + encodeURIComponent(v);
}
document.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{
  if(e.key==='Enter') i.nextElementSibling ? i.parentElement.querySelector('button').click() : null;
}));
</script>
</body>
</html>
