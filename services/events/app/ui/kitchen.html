<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateWay — Kitchen Screen</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1526">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f7f8fb;--ink:#16181b;--green:#16337a;--mint:#3ecf8e;--line:#d9deea;--dim:#7a7f87}
*{box-sizing:border-box;margin:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:18px 16px 60px;max-width:640px;margin:0 auto}
.mark{font-weight:900;font-size:1.35rem}.mark span{color:#d81f2a}
.who{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:2px 0 18px}
.card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.card.ready{border-color:var(--green);background:#eef2fc}
.oid{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--dim)}
.chip{float:right;font-family:'IBM Plex Mono',monospace;font-size:.64rem;padding:4px 10px;border-radius:20px;text-transform:uppercase;background:#eee}
.chip.in_transit{background:#fdf1e3;color:#a86a1f}.chip.assigned{background:#efe9fa;color:#6d4fa8}
.items{font-size:1.08rem;font-weight:700;line-height:1.5;margin:10px 0}
.notes{font-size:.88rem;color:#8a6d3b;background:#fdf6e3;border-radius:8px;padding:8px 12px;margin-bottom:10px}
.when{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);margin-bottom:12px}
button{width:100%;padding:16px;border-radius:12px;border:none;background:var(--green);color:#fff;
font-weight:900;font-size:1rem;font-family:'Archivo';cursor:pointer}
.done-label{color:var(--green);font-weight:900;text-align:center;font-size:1rem;padding:8px}
.empty{text-align:center;color:var(--dim);padding:50px 12px}
.paused{background:#3a1512;color:#e07b6d;border-radius:12px;padding:12px 16px;font-weight:800;
text-align:center;margin-bottom:14px;font-size:.85rem}

/* ===== GateWay design core v0.26 ===== */
*{-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:contain}
.gw-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#0e1526;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));box-shadow:0 2px 14px rgba(10,15,30,.28)}
.gw-bar img{height:34px;display:block}
.gw-bar .surf{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8b93a7;
text-transform:uppercase;letter-spacing:.14em}
.gw-dash{display:inline-flex;gap:3px;vertical-align:middle}
.gw-dash i{width:14px;height:5px;border-radius:2px;transform:skewX(-18deg)}
.gw-dash i:nth-child(1){background:#2f6fe0}.gw-dash i:nth-child(2){background:#e8eaf0}.gw-dash i:nth-child(3){background:#d81f2a}
button, .tile, a{transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease}
button:active{transform:scale(.97)}
:focus-visible{outline:3px solid #2f6fe0;outline-offset:2px;border-radius:8px}
.skel{background:linear-gradient(100deg,#e9edf5 40%,#f6f8fc 50%,#e9edf5 60%);background-size:200% 100%;
animation:gwsh 1.2s infinite linear;border-radius:14px}
@keyframes gwsh{to{background-position:-200% 0}}
body{padding-top:76px !important}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.card{border-radius:20px !important;box-shadow:0 4px 18px rgba(20,30,60,.08)}
.card.ready{box-shadow:0 4px 18px rgba(22,51,122,.14)}
button{background:linear-gradient(135deg,#16337a,#1e4292) !important;border-radius:14px !important;
box-shadow:0 8px 22px rgba(22,51,122,.3);font-size:1.05rem !important}
#gateBtn{background:transparent !important;box-shadow:none !important;font-size:.82rem !important}
</style>
</head>
\1
<div class="gw-bar"><img src="/static/logo-bar.png" alt="GateWay Dispatch">
<span class="surf">Kitchen <span class="gw-dash"><i></i><i></i><i></i></span></span></div>

<div class="mark" style="display:none">GateWay <span>Kitchen</span></div>
<div class="who" id="who">LOADING…</div>
<div id="pauseBanner"></div>
<button id="gateBtn" onclick="toggleGate()" style="width:auto;padding:10px 18px;margin-bottom:14px;border-radius:20px;font-size:.82rem;background:transparent;border:1.5px solid #16337a;color:#16337a;font-weight:800;display:none"></button>
<div id="list"><div class="empty">Loading…</div></div>
<div style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#9a9ea5;text-align:center;margin-top:24px;text-transform:uppercase;letter-spacing:.08em">
Tap READY when the order is bagged. GateWay Dispatch · Fivestone Holdings · <a href="/guide/kitchen" style="color:#16337a">How it works</a></div>
<script>
const token = location.pathname.split('/').filter(Boolean).pop();
const api = p => `/api/kitchen/${token}` + p;
let KNOWN = new Set(), FIRST = true, ACCEPTING = true;
function paintGate(){
  const b = document.getElementById('gateBtn');
  b.style.display = '';
  b.textContent = ACCEPTING ? '⏸ Pause new orders' : '▶ Resume orders';
  b.style.background = ACCEPTING ? 'transparent' : '#16337a';
  b.style.color = ACCEPTING ? '#16337a' : '#fff';
}
async function toggleGate(){
  const r = await fetch(api('/accepting'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({on: !ACCEPTING})});
  if(r.ok){ ACCEPTING = !ACCEPTING; paintGate(); load(); }
}

function esc(x){ const d=document.createElement('div'); d.textContent=x||''; return d.innerHTML; }
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0, .2].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 880; o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(.35, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .18);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .2);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([180, 90, 180]);
}
function fmtWhen(o){
  if(o.requested_for) return 'SCHEDULED · ' + esc(o.requested_for).replace('T',' ').slice(0,16);
  return 'ASAP · in ' + esc((o.received_at||'').replace('T',' ').slice(11,16)) + ' UTC';
}
async function load(){
  const r = await fetch(api('/orders'));
  if(!r.ok){ document.getElementById('list').innerHTML =
    '<div class="empty">This kitchen link isn\'t valid. Ask GateWay for a fresh one.</div>';
    document.getElementById('who').textContent = '—'; return; }
  const d = await r.json();
  document.getElementById('who').textContent = d.kitchen.toUpperCase() + ' · TODAY';
  ACCEPTING = d.accepting; paintGate();
  document.getElementById('pauseBanner').innerHTML = d.accepting ? '' :
    '<div class="paused">ORDERING PAUSED — customers can\'t order right now. GateWay can resume it.</div>';
  const fresh = d.orders.filter(o=>!KNOWN.has(o.order_id));
  if(!FIRST && fresh.length) beep();
  d.orders.forEach(o=>KNOWN.add(o.order_id));
  FIRST = false;
  document.getElementById('list').innerHTML = d.orders.length ? d.orders.map(o=>`
    <div class="card ${o.ready?'ready':''}" id="${o.id}">
      <span class="chip ${o.status}">${o.status.replace('_',' ')}</span>
      <div class="oid">${o.order_id}</div>
      <div class="items">${esc(o.items)||'—'}</div>
      ${o.notes?`<div class="notes">📝 ${esc(o.notes)}</div>`:''}
      <div class="when">${fmtWhen(o)}</div>
      ${o.ready
        ? '<div class="done-label">✓ READY — driver notified</div>'
        : `<button onclick="markReady('${o.id}')">READY FOR PICKUP ✓</button>`}
    </div>`).join('') :
    '<div class="empty">No open orders right now.<br>New ones will ring in automatically. 🔔</div>';
}
async function markReady(id){
  const r = await fetch(api(`/orders/${id}/ready`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body:'{}'});
  if(r.ok) load();
}
function netDown(){
  if(document.getElementById('netB')) return;
  const b = document.createElement('div'); b.id = 'netB';
  b.textContent = '⚠ Connection lost — retrying…';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d81f2a;color:#fff;font-weight:800;text-align:center;padding:8px;z-index:99;font-size:.8rem';
  document.body.prepend(b);
}
function netUp(){ const b = document.getElementById('netB'); if(b) b.remove(); }
const _rawLoad = load;
load = async function(){ try { await _rawLoad(); netUp(); } catch(e) { netDown(); } };
load(); setInterval(load, 20000);
</script>
</body>
</html>
