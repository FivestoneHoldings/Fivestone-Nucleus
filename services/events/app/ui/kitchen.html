<style>
:root{--paper:#f7f8fb;--ink:#16181b;--green:#16337a;--mint:#3ecf8e;--line:#d9deea;--dim:#7a7f87}
*{box-sizing:border-box;margin:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:18px 16px 60px;max-width:640px;margin:0 auto}
.mark{font-weight:900;font-size:1.35rem}.mark span{color:#d81f2a}
.who{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:2px 0 18px}
.card{background:#fff;border:1px solid #e4e8f2;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px rgba(20,30,60,.08)}
.card.ready{border-color:var(--green);background:#eef2fc}
.oid{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--dim)}
.chip{float:right;font-family:'IBM Plex Mono',monospace;font-size:.64rem;padding:4px 10px;border-radius:20px;text-transform:uppercase;background:#eee}
.agebadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:700;
letter-spacing:.04em;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.agebadge.age-ok{background:#eef4ee;color:#3a7a4a}
.agebadge.age-warm{background:#fdf1de;color:#9a5f10}
.agebadge.age-hot{background:#fde3e3;color:#b5202a;animation:ageHot 1.4s ease-in-out infinite}
@keyframes ageHot{0%,100%{opacity:1}50%{opacity:.5}}
@media (prefers-reduced-motion:reduce){.agebadge.age-hot{animation:none}}
.chip.in_transit{background:#fdf1e3;color:#a86a1f}.chip.assigned{background:#efe9fa;color:#6d4fa8}
.items{font-size:1.08rem;font-weight:700;line-height:1.5;margin:10px 0}
.iline{padding:3px 0;font-size:1.08rem;font-weight:700;line-height:1.35}
.iqty{display:inline-block;min-width:1.9em;color:#16337a;font-family:'IBM Plex Mono',monospace;font-weight:800}
.notes{font-size:.92rem;font-weight:700;color:#8a4b0b;background:#fff4e0;border:1.5px solid #f0c88a;
border-left:4px solid #e08a1e;border-radius:8px;padding:9px 13px;margin-bottom:10px;line-height:1.4}
.when{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);margin-bottom:12px}
button{width:100%;padding:16px;border-radius:12px;border:none;background:var(--green);color:#fff;
font-weight:900;font-size:1rem;font-family:'Archivo';cursor:pointer}
button.accept{background:linear-gradient(135deg,#2f6fe0,#16337a)}
button.ghost-btn{background:transparent;color:#16337a;border:1.5px solid #cdd6ea;font-weight:700;
font-size:.84rem;padding:11px;margin-top:8px}

text-align:center;margin-bottom:14px;font-size:.85rem}

/* ===== GateWay design core v0.26 ===== */
*{-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:contain}
.gw-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#0e1526;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));box-shadow:0 2px 14px rgba(10,15,30,.28)}
.gw-bar img{height:34px;display:block}
.gw-bar .surf{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8b93a7;
text-transform:uppercase;letter-spacing:.14em}
.gw-dash{display:inline-flex;gap:3px;vertical-align:middle}
.gw-dash i{width:14px;height:5px;border-radius:2px;transform:skewX(-18deg)}
.gw-dash i:nth-child(1){background:#2f6fe0}.gw-dash i:nth-child(2){background:#e8eaf0}.gw-dash i:nth-child(3){background:#d81f2a}
button, .tile, a{transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease}
button:active{transform:scale(.97)}
:focus-visible{outline:3px solid #2f6fe0;outline-offset:2px;border-radius:8px}
.skel{background:linear-gradient(100deg,#e9edf5 40%,#f6f8fc 50%,#e9edf5 60%);background-size:200% 100%;
animation:gwsh 1.2s infinite linear;border-radius:14px}
@keyframes gwsh{to{background-position:-200% 0}}
body{padding-top:76px !important}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}


.card.ready{box-shadow:0 4px 18px rgba(22,51,122,.14)}
button{background:linear-gradient(135deg,#16337a,#1e4292) !important;border-radius:14px !important;
box-shadow:0 8px 22px rgba(22,51,122,.3);font-size:1.05rem !important}
#gateBtn{background:transparent !important;box-shadow:none !important;font-size:.82rem !important}

.items{font-size:1.18rem !important}
.card.new{animation:slidein .4s ease-out}
@keyframes slidein{from{transform:translateY(-14px);opacity:0}to{transform:none;opacity:1}}
#pickchip{font-family:'IBM Plex Mono',monospace;font-size:.64rem;color:#7a7f87;
letter-spacing:.08em;text-transform:uppercase;margin:-10px 0 14px}

.pride{display:flex;gap:8px;margin:2px 0 16px;flex-wrap:wrap}
.pride .p{flex:1;min-width:72px;background:#fff;border:1px solid #e4e8f2;border-radius:14px;
padding:12px 10px;text-align:center;box-shadow:0 2px 10px rgba(20,30,60,.05)}
.pride .p b{display:block;font-size:1.5rem;color:#16337a;line-height:1.1}
.pride .p span{font-family:'IBM Plex Mono',monospace;font-size:.54rem;color:#7a7f87;
text-transform:uppercase;letter-spacing:.08em}
.pride .p.accent b{color:#d81f2a}

/* v0.49 viewport guard — nothing may exceed the phone's width */
/* overflow-x:hidden on html+body is a documented Safari scroll-breaker
   (body becomes the scroll container; wheel/trackpad can dead-lock).
   clip clips horizontal overflow WITHOUT creating a scroll container. */
html,body{max-width:100%;overflow-x:clip}
@supports not (overflow: clip){html,body{overflow-x:hidden}}
img,svg,video{max-width:100%;height:auto}
*{min-width:0}
.gw-bar{box-sizing:border-box;max-width:100vw}
.catnav{max-width:100%}
pre,code{white-space:pre-wrap;word-break:break-word}

border:1.5px solid #d9deea;color:#5a5e64;font-weight:800;font-size:.82rem;font-family:'Archivo';
cursor:pointer;box-shadow:none}
.undo:active{transform:scale(.98)}

<div class="gw-bar"><img src="/static/logo-bar.png" alt="GateWay Dispatch">

<button onclick="togglePosts()" style="width:100%;padding:11px;margin-bottom:14px;background:transparent;border:1.5px solid #dfe4ee;color:#5a5e64;font-size:.82rem;box-shadow:none">📰 Post an update — your news feed</button>
<div id="postsPanel" style="display:none;margin-bottom:14px"></div>
<div id="historyPanel" style="display:none;margin-bottom:14px"></div>
<div id="alertBanner" style="display:none"></div>
<div id="loadBanner"></div>
<div id="pride" class="pride"></div>
<div id="pickchip" style="display:none"></div>
<div id="pauseBanner"></div>
<button id="gateBtn" onclick="toggleGate()" style="width:auto;padding:10px 18px;margin-bottom:14px;border-radius:20px;font-size:.82rem;background:transparent;border:1.5px solid #16337a;color:#16337a;font-weight:800;display:none"></button>
<div id="list"><div class="skel" style="height:118px;margin-bottom:12px"></div><div class="skel" style="height:118px;margin-bottom:12px"></div><div class="skel" style="height:118px;opacity:.6"></div></div>
<div style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#9a9ea5;text-align:center;margin-top:24px;text-transform:uppercase;letter-spacing:.08em">
Tap READY when the order is bagged. GateWay Dispatch · Fivestone Holdings · <a href="/guide/kitchen" style="color:#16337a">How it works</a></div>
<script src="/static/gw-ui.js"></script>
<script>
const token = location.pathname.split('/').filter(Boolean).pop();
const api = p => `/api/kitchen/${token}` + p;
let KNOWN = new Set(), FIRST = true, ACCEPTING = true;
function paintGate(){
  const b = document.getElementById('gateBtn');
  b.style.display = '';
  b.textContent = ACCEPTING ? '⏸ Pause new orders' : '▶ Resume orders';
  b.style.background = ACCEPTING ? 'transparent' : '#16337a';
  b.style.color = ACCEPTING ? '#16337a' : '#fff';
}
async function showFeedback(){
  const el = document.getElementById('fbPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  const d = await (await fetch('/api/kitchen-feedback/' + token)).json();
  el.innerHTML = `<div class="card" style="margin:0">
    <div style="display:flex;gap:16px;margin-bottom:12px">
      <div><div style="font-size:1.6rem;font-weight:900;color:#16337a">${d.loved||0}</div>
        <div style="font-family:monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:#7a7f87">Loved it</div></div>
      <div><div style="font-size:1.6rem;font-weight:900;color:#d81f2a">${d.issues||0}</div>
        <div style="font-family:monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:#7a7f87">Had an issue</div></div>
    </div>
    ${(d.notes||[]).length ? (d.notes||[]).map(n=>`
      <div style="border-left:3px solid ${n.good?'#16337a':'#d81f2a'};padding:7px 0 7px 11px;margin-bottom:9px">
        <div style="font-size:.88rem;line-height:1.45">${esc(n.note)}</div>
        <div style="font-family:monospace;font-size:.58rem;color:#9a9ea5;margin-top:3px">${esc(n.order_id)} · ${esc((n.at||'').slice(0,10))}</div>
      </div>`).join('')
      : '<div style="color:#9a9ea5;font-size:.85rem">No notes yet. When neighbors write, you read it here first — never a public star rating.</div>'}
  </div>`;
}
async function editSpecial(current){
  const text = await gwPrompt({title:"Today's special", multiline:true, value: current,
    placeholder:'Brisket just came off the smoker — while it lasts.',
    confirm:'Post it', cancel:'Back',
    body:'Customers see this at the top of your menu and on the GateWay home screen — instantly. No approval, no ad buy. Leave blank to clear it.'});
  if(text === null) return;
  const r = await fetch(api('/special'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})});
  if(r.ok){ gwToast(text ? 'Special posted ✓' : 'Special cleared'); load(); }
  else gwToast('Could not post.', false);
}
async function pauseFifteen(){
  const ok = await gwConfirm({title:'Pause new orders for 15 minutes?',
    body:'Customers will see you\'re paused. It auto-resumes in 15 minutes so you can catch up without forgetting to turn it back on.',
    confirm:'Pause 15 min', danger:true});
  if(!ok) return;
  const r = await fetch(api('/accepting'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({on:false})});
  if(r.ok){ ACCEPTING = false; paintGate(); gwToast('Paused — auto-resumes in 15 min');
    try{ localStorage.setItem('gw_kitchen_resume', String(Date.now()+15*60000)); }catch(e){}
  }
}
// auto-resume watchdog
setInterval(async ()=>{
  try{
    const t = parseInt(localStorage.getItem('gw_kitchen_resume')||'0');
    if(t && Date.now() >= t){
      localStorage.removeItem('gw_kitchen_resume');
      await fetch(api('/accepting'), {method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify({on:true})});
      ACCEPTING = true; paintGate(); gwToast('Back open — orders resumed ✓'); load();
    }
  }catch(e){}
}, 30000);
async function toggleGate(){
  const r = await fetch(api('/accepting'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({on: !ACCEPTING})});
  if(r.ok){ ACCEPTING = !ACCEPTING; paintGate(); load(); }
}

function esc(x){ const d=document.createElement('div'); d.textContent=x||''; return d.innerHTML; }
// Turn "2× Pad Thai ($9.00), 1× Spring Rolls ($4.00) — subtotal $13.00" into a
// clean line-per-item list with the quantity bold — a line cook reads this at a
// glance, not a run-on string. Special-request notes stay separate below.
function fmtItems(raw){
  if(!raw) return '—';
  // drop the trailing subtotal the cook doesn't need on the line
  let s = String(raw).split(' — subtotal')[0];
  const parts = s.split(/,\s*(?=\d+\s*[×xX])/); // split on ", " before "N×"
  const lines = parts.map(p => {
    const m = p.match(/^\s*(\d+)\s*[×xX]\s*(.+?)(?:\s*\(\$[\d.]+\))?\s*$/);
    if(m){
      const qty = m[1], name = m[2].trim();
      return `<div class="iline"><span class="iqty">${esc(qty)}×</span> ${esc(name)}</div>`;
    }
    return `<div class="iline">${esc(p.trim())}</div>`;
  });
  return lines.join('');
}
function requestOrderAlerts(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission().then(paintAlertBanner);
  }
}
function paintAlertBanner(){
  const el = document.getElementById('alertBanner');
  if(!el || !('Notification' in window)) return;
  if(Notification.permission === 'granted'){ el.style.display = 'none'; return; }
  if(Notification.permission === 'denied'){
    el.innerHTML = `<div style="background:#fdecec;border:1.5px solid #f0c0c0;color:#a83c3c;border-radius:14px;padding:10px 14px;margin-bottom:12px;font-size:.8rem">🔕 Desktop alerts are blocked. You'll still get the beep + on-screen ticket for new orders.</div>`;
    el.style.display = ''; return;
  }
  el.innerHTML = `<button onclick="requestOrderAlerts()" style="width:100%;padding:11px;margin-bottom:12px;background:transparent;border:1.5px dashed #c3d0f0;color:#16337a;box-shadow:none;font-size:.82rem">🔔 Turn on desktop alerts — never miss a ticket, even in another tab</button>`;
  el.style.display = '';
}
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0, .2].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 880; o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(.35, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .18);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .2);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([180, 90, 180]);
}
function fmtWhen(o){
  if(o.requested_for) return 'SCHEDULED · ' + esc(o.requested_for).replace('T',' ').slice(0,16);
  return 'ASAP · in ' + esc((o.received_at||'').replace('T',' ').slice(11,16)) + ' UTC';
}
/* ===== 86 AN ITEM, FROM THE KITCHEN (v1.3) ===== The person who knows the
   shrimp just ran out is standing here — not logged into the board. This is
   scoped to THIS kitchen's own token and can only flip availability, never
   price or name. ===== */
let MENU86_CACHE = null;
function relTimeK(iso){
  try{
    const mins = Math.floor((Date.now() - new Date(iso).getTime())/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins/60);
    if(hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs/24) + 'd ago';
  }catch(e){ return ''; }
}
async function togglePosts(){
  const el = document.getElementById('postsPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = ''; await paintPosts();
}
async function paintPosts(){
  const el = document.getElementById('postsPanel');
  el.innerHTML = '<div class="card">Loading…</div>';
  try{
    const d = await (await fetch(api('/posts'))).json();
    const posts = d.posts || [];
    el.innerHTML = `<div class="card">
      <textarea id="postText" maxlength="280" placeholder="Back from vacation! New winter menu is in! We're famous for our..." style="width:100%;min-height:70px;border:1.5px solid #dfe4ee;border-radius:12px;padding:11px;font-family:inherit;font-size:.85rem;box-sizing:border-box;resize:vertical"></textarea>
      <button onclick="submitPost()" style="margin-top:8px">Post to your GateWay page</button>
      ${posts.length ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#8b93a7;margin:16px 0 8px">Your recent posts</div>
        ${posts.map(p=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #f2f4f8">
          <div style="min-width:0"><div style="font-size:.84rem;line-height:1.4">${esc(p.text)}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#9199a8;margin-top:3px">${relTimeK(p.created_at)}</div></div>
          <button onclick="deletePost('${p.id}')" style="flex:0 0 auto;width:auto;padding:6px 11px;font-size:.68rem;background:transparent;color:#b5202a;border:1.5px solid #f0c0c0;box-shadow:none;margin:0">Remove</button>
        </div>`).join('')}` : `<div style="padding:14px 0;color:#8b93a7;font-size:.85rem">No posts yet — customers see this as a live news feed on your page.</div>`}
    </div>`;
  }catch(e){
    el.innerHTML = '<div class="card">Couldn\u2019t load your posts. Try again.</div>';
  }
}
async function submitPost(){
  const box = document.getElementById('postText');
  const text = (box.value || '').trim();
  if(!text) return;
  const r = await fetch(api('/posts'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})});
  if(r.ok){ gwToast('Posted to your GateWay page \u2713', true); paintPosts(); }
  else gwToast('Could not post. Try again.', false);
}
async function deletePost(id){
  const ok = await gwConfirm({title:'Remove this post?', body:'It will disappear from your page immediately.', danger:true});
  if(!ok) return;
  await fetch(api('/posts/' + id), {method:'DELETE'});
  paintPosts();
}
async function toggleHistory(){
  const el = document.getElementById('historyPanel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display=''; el.innerHTML = '<div class="card">Loading…</div>';
  try{
    const d = await (await fetch(api('/history'))).json();
    const money = c => '$' + (Math.max(0,c||0)/100).toFixed(2);
    const t = iso => { try{ return new Date(iso).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } };
    const top = (d.top_sellers||[]);
    const tix = (d.tickets||[]);
    el.innerHTML = `<div class="card">
      ${top.length?`<div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#8b93a7;margin-bottom:8px">Top sellers today</div>
        ${top.map((s,i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.88rem;border-bottom:1px solid #f2f4f8">
          <span style="font-weight:700">${i+1}. ${esc(s.name)}</span><b style="color:#16337a">${s.qty}×</b></div>`).join('')}
        <div style="height:12px"></div>`:''}
      <div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#8b93a7;margin-bottom:8px">Tickets out the door (${tix.length})</div>
      ${tix.length ? tix.map(x=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #f2f4f8">
        <div style="min-width:0">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#9199a8">${esc(x.order_id)}${x.delivered_at?` \u00b7 ${t(x.delivered_at)}`:''} \u00b7 ${esc(x.status.replace('_',' '))}</div>
          <div style="font-size:.8rem;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc((x.items||'').split(' \u2014 subtotal')[0])}</div>
        </div>
        <b style="flex:0 0 auto;font-size:.85rem">${money(x.subtotal_cents)}</b>
      </div>`).join('') : `<div style="padding:14px 0;color:#8b93a7;font-size:.85rem">Nothing out the door yet today.</div>`}
    </div>`;
  }catch(e){
    el.innerHTML = '<div class="card">Couldn\u2019t load today\u2019s review. Try again.</div>';
  }
}
async function show86(){
  const el = document.getElementById('menu86Panel');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  el.innerHTML = '<div class="skel" style="height:80px"></div>';
  try{
    const d = await (await fetch(api('/menu'))).json();
    MENU86_CACHE = d;
    paint86();
  }catch(e){
    el.innerHTML = '<div class="card" style="color:#f0a04b">Could not load the menu.</div>';
  }
}
function paint86(){
  const el = document.getElementById('menu86Panel');
  const cats = (MENU86_CACHE && MENU86_CACHE.categories) || [];
  if(!cats.length){ el.innerHTML = '<div class="card">No menu items yet.</div>'; return; }
  const q = (document.getElementById('m86Search')?.value || '').trim().toLowerCase();
  const filtCats = q
    ? cats.map(c => ({...c, items: c.items.filter(i => i.name.toLowerCase().includes(q))}))
          .filter(c => c.items.length)
    : cats;
  const search = `<input id="m86Search" type="text" placeholder="Find an item to 86…"
    oninput="paint86()" value="${(document.getElementById('m86Search')?.value||'').replace(/"/g,'&quot;')}"
    style="width:100%;padding:10px 13px;margin-bottom:10px;border-radius:10px;border:1.5px solid #dfe4ee;font-family:inherit;font-size:.85rem">`;
  const body = filtCats.length ? filtCats.map(c => `
    <div style="font-weight:800;font-size:.82rem;margin:10px 0 6px;color:#8b93a7;
      font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em">${esc(c.name)}</div>
    ${c.items.map(i => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e2942">
        <span style="flex:1;font-size:.86rem;${i.available?'':'opacity:.4;text-decoration:line-through'}">${esc(i.name)}</span>
        <button onclick="toggle86('${i.id}', ${i.available})"
          style="flex:0 0 auto;padding:8px 14px;border-radius:20px;font-size:.76rem;font-weight:800;
          background:${i.available?'transparent':'#d81f2a'};color:${i.available?'#f0a04b':'#fff'};
          border:1.5px solid ${i.available?'#f0a04b':'#d81f2a'};box-shadow:none">
          ${i.available ? '86 this' : "We're back"}</button>
      </div>`).join('')}`).join('')
    : `<div style="padding:16px 0;color:#8b93a7;font-size:.85rem">Nothing matches "${esc(q)}".</div>`;
  el.innerHTML = '<div class="card">' + search + body + '</div>';
}
async function toggle86(id, wasAvailable){
  const r = await fetch(api(`/menu-items/${id}/86`), {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({available: !wasAvailable})});
  if(r.ok){
    const d = await r.json();
    gwToast(d.available ? `${d.name} is back on the menu ✓` : `${d.name} 86'd — off the menu now`, true);
    const fresh = await (await fetch(api('/menu'))).json();
    MENU86_CACHE = fresh; paint86();   // refresh in place, panel stays open
  } else {
    gwToast("That didn't go through. Try again.", false);
  }
}

async function load(){
  const r = await fetch(api('/orders'));
  if(!r.ok){ document.getElementById('list').innerHTML =
    '<div class="empty">This kitchen link isn\'t valid. Ask GateWay for a fresh one.</div>';
    document.getElementById('who').textContent = '—'; return; }
  const d = await r.json();
  const who = document.getElementById('who');
  if(d.logo_url){
    who.innerHTML = '<img src="' + d.logo_url + '" alt="" style="height:26px;width:26px;border-radius:7px;object-fit:contain;background:#fff;vertical-align:middle;margin-right:8px;border:1px solid #e4e8f2">' +
      '<span style="vertical-align:middle">' + esc(d.kitchen.toUpperCase()) + ' · TODAY</span>';
  } else {
    who.textContent = d.kitchen.toUpperCase() + ' · TODAY';
  }
  const rev = d.revenue_today_cents ? '$' + (d.revenue_today_cents/100).toFixed(0) : '$0';
  const peak = d.peak_hour !== '' ? (((+d.peak_hour%12)||12) + (d.peak_hour<12?'a':'p')) : '—';
  document.getElementById('pride').innerHTML =
    `<div class="p"><b>${d.in_kitchen_now||0}</b><span>In kitchen now</span></div>
     <div class="p accent"><b>${d.delivered_today||0}</b><span>Delivered today</span></div>
     <div class="p"><b>${rev}</b><span>Food sales today</span></div>
     <div class="p"><b>${peak}</b><span>Busiest hour</span></div>`;
  ACCEPTING = d.accepting; paintGate();
  const sp = d.special || '';
  document.getElementById('specialBar').innerHTML = sp
    ? `<div style="background:#fdf9ee;border:1.5px solid #eadfae;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div><div style="font-family:monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:#a8894a">Today's special — live to customers</div>
        <div style="font-weight:800;font-size:.92rem;margin-top:2px">${esc(sp)}</div></div>
        <button onclick="editSpecial(${JSON.stringify(sp)})" style="flex:0 0 auto;width:auto;padding:9px 13px;font-size:.75rem;margin:0;background:transparent;color:#a8894a;border:1.5px solid #eadfae;box-shadow:none">Change</button></div>`
    : `<button onclick="editSpecial('')" style="width:100%;padding:12px;background:transparent;border:1.5px dashed #c3d0f0;color:#16337a;box-shadow:none;font-size:.84rem">✨ Post today's special</button>`;
  const lb = document.getElementById('loadBanner');
  if(d.load === 'slammed' && ACCEPTING){
    lb.innerHTML = `<div style="background:#3a1512;color:#ffb4a8;border-radius:14px;padding:12px 16px;margin-bottom:14px;font-weight:700;font-size:.86rem;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <span>🔥 Slammed — ${d.in_kitchen_now} tickets working. Pause new orders to catch up?</span>
      <button onclick="pauseFifteen()" style="flex:0 0 auto;width:auto;padding:9px 14px;font-size:.78rem;background:#d81f2a;box-shadow:none;margin:0">Pause 15 min</button></div>`;
  } else if(d.load === 'busy' && ACCEPTING){
    lb.innerHTML = `<div style="background:#fdf6e3;color:#8a6d3b;border:1px solid #eadfae;border-radius:14px;padding:10px 14px;margin-bottom:14px;font-weight:600;font-size:.82rem">⏳ Busy — ${d.in_kitchen_now} tickets working. You're keeping up.</div>`;
  } else { lb.innerHTML = ''; }
  document.getElementById('pauseBanner').innerHTML = d.accepting ? '' :
    '<div class="paused">ORDERING PAUSED — customers can\'t order right now. GateWay can resume it.</div>';
  const fresh = d.orders.filter(o=>!KNOWN.has(o.order_id));
  if(!FIRST && fresh.length){
    beep();
    if('Notification' in window && Notification.permission === 'granted'){
      const n = new Notification('New order at ' + (d.kitchen||'your kitchen'), {
        body: fresh.length > 1 ? `${fresh.length} new tickets just came in` : `Ticket ${fresh[0].order_id}`,
        tag: 'gw-kitchen-order', requireInteraction: true,
      });
      n.onclick = () => { window.focus(); n.close(); };
    }
  }
  const freshIds = new Set(fresh.map(o=>o.order_id));
  d.orders.forEach(o=>KNOWN.add(o.order_id));
  const KLABEL = {received:'NEW', confirmed:'CONFIRMED', assigned:'DRIVER COMING'};
  const wasFirst = FIRST;
  FIRST = false;
  document.getElementById('list').innerHTML = d.orders.length ? d.orders.map(o=>`
    <div class="card ${o.ready?'ready':''} ${!wasFirst && freshIds.has(o.order_id)?'new':''}" id="${o.id}">
      <span class="chip ${o.status}">${KLABEL[o.status]||o.status.replace('_',' ')}</span>
      ${o.ready ? '' : ageBadge(o.received_at)}
      <div class="oid">${o.order_id}</div>
      <div class="items">${fmtItems(o.items)}</div>
      ${o.notes?`<div class="notes">📝 ${esc(o.notes)}</div>`:''}
      <div class="when">${fmtWhen(o)}</div>
      ${o.ready
        ? `<div class="done-label">✓ READY — driver notified</div>
           <button class="undo" id="undo-${o.id}" onclick="undoReady('${o.id}')"
             style="display:none">↩ Undo — not ready yet</button>`
        : (o.status === 'received'
            ? `<button class="accept" onclick="acceptOrder('${o.id}')">✓ Accept order</button>
               <button class="ghost-btn" onclick="acceptWithTime('${o.id}')">Accept + set prep time…</button>`
            : `<button onclick="markReady('${o.id}')">READY FOR PICKUP ✓</button>`)}
    </div>`).join('') :
    `<div class="empty" style="padding:56px 20px"><div class="gw-dash" style="justify-content:center;margin-bottom:16px"><i></i><i></i><i></i></div><div style="font-weight:800;font-size:1rem">Kitchen's quiet</div><div style="font-size:.82rem;margin-top:4px">No open orders. New tickets ring in here automatically. 🔔</div></div>`;
}
/* A ticket that's sat too long is the one thing a busy line can lose track of.
   Green under 10 min, amber 10-20, red pulsing past 20 — impossible to miss. */
function ageBadge(receivedAt){
  if(!receivedAt) return '';
  const mins = Math.floor((Date.now() - new Date(receivedAt).getTime()) / 60000);
  if(mins < 0) return '';
  let cls = 'age-ok', label = mins + ' min';
  if(mins >= 20){ cls = 'age-hot'; label = mins + ' min \u2014 check this'; }
  else if(mins >= 10){ cls = 'age-warm'; label = mins + ' min'; }
  return `<span class="agebadge ${cls}">${label}</span>`;
}
/* --- UNDO (v1.1) --- A thumb slips. For 120 seconds, and only while the food is
   still in this kitchen, the cook can take it back. After that the button tells
   the truth instead of pretending: call dispatch. --- */
const UNDO_WINDOW_MS = 120000;
const READY_AT = {};   // id -> ms, this session only

async function acceptOrder(id, estimate){
  const body = estimate ? {prep_estimate_minutes: estimate} : {};
  const r = await fetch(api(`/orders/${id}/accept`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if(r.ok){
    await load();
    gwToast(estimate ? `Accepted — ~${estimate} min told to the customer ✓` : 'Order accepted ✓', true);
  } else {
    gwToast("That didn't go through. Try again.", false);
  }
}
async function acceptWithTime(id){
  const v = await gwPrompt({title:'How long will this take?',
    placeholder:'e.g. 20', inputmode:'numeric', confirm:'Accept order',
    body:"We'll show the customer this estimate on their tracking screen. Minutes only."});
  if(v === null) return;
  const mins = Math.max(0, Math.min(120, parseInt(String(v).replace(/[^0-9]/g,'')) || 0));
  acceptOrder(id, mins || undefined);
}
async function markReady(id){
  const r = await fetch(api(`/orders/${id}/ready`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body:'{}'});
  if(r.ok){
    READY_AT[id] = Date.now();
    await load();
    showUndo(id);
    gwToast('Marked ready — the driver has been told. You can undo for 2 minutes.', true);
  } else {
    gwToast("That didn't go through. Try again.", false);
  }
}

function showUndo(id){
  const b = document.getElementById('undo-' + id);
  if(!b || !READY_AT[id]) return;
  const tick = () => {
    const left = UNDO_WINDOW_MS - (Date.now() - READY_AT[id]);
    if(left <= 0){ b.style.display = 'none'; return; }
    b.style.display = '';
    b.textContent = `↩ Undo — not ready yet (${Math.ceil(left/1000)}s)`;
    setTimeout(tick, 1000);
  };
  tick();
}

async function undoReady(id){
  const ok = await gwConfirm({
    title: 'Take this ticket back?',
    body: "It'll go back on the rail as still cooking, and the driver will be told to wait.",
    confirm: 'Yes, undo', cancel: 'Never mind'});
  if(!ok) return;
  const r = await fetch(api(`/orders/${id}/unready`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body:'{}'});
  if(r.ok){
    delete READY_AT[id];
    await load();
    gwToast('Taken back — the ticket is cooking again.', true);
  } else {
    let msg = "Couldn't undo that one.";
    try{ const d = await r.json(); if(d.detail) msg = d.detail; }catch(e){}
    gwToast(msg, false);
  }
}
function netDown(){
  if(document.getElementById('netB')) return;
  const b = document.createElement('div'); b.id = 'netB';
  b.textContent = '⚠ Connection lost — retrying…';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d81f2a;color:#fff;font-weight:800;text-align:center;padding:8px;z-index:99;font-size:.8rem';
  document.body.prepend(b);
}
function netUp(){ const b = document.getElementById('netB'); if(b) b.remove(); }
const _rawPaintUndo = load;
load = async function(){
  await _rawPaintUndo();
  Object.keys(READY_AT).forEach(id => {
    if(Date.now() - READY_AT[id] < UNDO_WINDOW_MS) showUndo(id);
    else delete READY_AT[id];
  });
};
const _rawLoad = load;
load = async function(){ try { await _rawLoad(); netUp(); } catch(e) { netDown(); } };
load(); paintAlertBanner(); setInterval(load, 20000);
</script>
