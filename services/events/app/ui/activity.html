<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Activity · GateWay</title>
<link rel="icon" type="image/png" href="/static/icon-192.png">
<meta name="description" content="Every order you've placed with GateWay.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="theme-color" content="#0e1526">
<script>
function gwBack(){
  if(document.referrer && new URL(document.referrer, location.href).origin === location.origin
     && history.length > 1){ history.back(); }
  else { location.href = '/'; }
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}
</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="/static/gw-profile.js"></script>
<style>
:root{--paper:#f7f8fb;--ink:#14181f;--blue:#16337a;--line:#dfe4ee;--dim:#5a5e64;--green:#1a7f4b}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);
max-width:480px;margin:0 auto;padding:88px 20px 112px;-webkit-font-smoothing:antialiased}
.gw-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#0e1526;display:flex;
align-items:center;justify-content:space-between;padding:12px 16px;
padding-top:max(12px, env(safe-area-inset-top));box-shadow:0 2px 14px rgba(10,15,30,.28);max-width:480px;margin:0 auto}
.gw-bar img{height:34px;display:block}
.gw-bar .surf{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8b93a7;
text-transform:uppercase;letter-spacing:.14em}
.back{background:none;border:none;color:#c9d2e6;font-size:.8rem;font-weight:700;
display:flex;align-items:center;gap:5px;cursor:pointer;padding:6px 4px}
.back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:1.5rem;font-weight:900;letter-spacing:-.02em;margin-bottom:3px}
.sub{color:var(--dim);font-size:.84rem;margin-bottom:20px}
.card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;
box-shadow:0 1px 3px rgba(20,24,31,.04)}
.otop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.oname{font-weight:800;font-size:1rem;line-height:1.2}
.ooid{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#9199a8;letter-spacing:.04em;margin-top:3px}
.ostat{flex:0 0 auto;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
padding:4px 9px;border-radius:20px}
.ostat.live{background:#e7f4ec;color:var(--green)}
.ostat.done{background:#eef1f6;color:#6b7280}
.ometa{display:flex;justify-content:space-between;align-items:center;margin-top:12px;
padding-top:12px;border-top:1px solid #eef0f5}
.ott{font-weight:800;font-size:.95rem}
.ott small{display:block;font-weight:500;color:var(--dim);font-size:.68rem;letter-spacing:.02em}
.acts{display:flex;gap:8px}
.btn{border:none;border-radius:11px;padding:9px 15px;font-weight:800;font-size:.78rem;
cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn.track{background:linear-gradient(135deg,#2f6fe0,#16337a);color:#fff}
.btn.re{background:#f0f2f7;color:var(--blue);border:1.5px solid var(--line)}
.date{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;
letter-spacing:.1em;color:#9199a8;font-weight:500;margin:22px 2px 9px}
.date:first-of-type{margin-top:0}
.empty{text-align:center;padding:54px 20px}
.empty .dash{display:inline-flex;gap:5px;margin-bottom:20px}
.empty .dash i{width:26px;height:9px;border-radius:3px;transform:skewX(-18deg)}
.empty .dash i:nth-child(1){background:#2f6fe0}.empty .dash i:nth-child(2){background:#e2e5ec}.empty .dash i:nth-child(3){background:#d81f2a}
.empty h2{font-size:1.15rem;font-weight:900;margin-bottom:7px}
.empty p{color:var(--dim);font-size:.88rem;line-height:1.5;margin-bottom:22px}
.empty a{background:linear-gradient(135deg,#2f6fe0,#16337a);color:#fff;text-decoration:none;
font-weight:800;padding:13px 26px;border-radius:13px;display:inline-block;font-size:.9rem}
.tally{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;
margin-bottom:20px;display:flex;justify-content:space-around;text-align:center}
.tally b{display:block;font-size:1.3rem;font-weight:900;color:var(--blue)}
.tally span{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);font-weight:700}

.gw-nav a.on svg{stroke-width:2.2}
@media (prefers-reduced-motion: reduce){.gw-nav a{transition:none}}
</style>
</head>
<body>
<div class="gw-bar">
  <button class="back" onclick="gwBack()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Back</button>
  <span class="surf">Activity</span>
</div>

<h1>Your orders</h1>
<div class="sub" id="sub">Everything you've sent to GateWay, newest first.</div>

<div id="tally" style="display:none"></div>
<div id="list"></div>



<script>
function money(c){ return '$' + (Math.max(0,c||0)/100).toFixed(2); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// An order is "live" for a while after it's placed — we don't have a push
// channel here, so we treat anything from the last 3 hours as trackable-live.
function isLive(at){
  if(!at) return false;
  const age = Date.now() - new Date(at).getTime();
  return age >= 0 && age < 3*60*60*1000;
}
function dayLabel(at){
  if(!at) return 'Earlier';
  const d = new Date(at), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if(sameDay) return 'Today';
  const y = new Date(now); y.setDate(now.getDate()-1);
  if(d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
}
function timeLabel(at){
  if(!at) return '';
  return new Date(at).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}

function render(){
  const p = (window.gwProfile && gwProfile.get()) || {};
  const hist = (p.history || []).filter(h=>h && h.oid);
  const list = document.getElementById('list');

  if(!hist.length){
    document.getElementById('sub').style.display = 'none';
    list.innerHTML = `<div class="empty">
      <div class="dash"><i></i><i></i><i></i></div>
      <h2>No orders yet</h2>
      <p>When you place your first order, it'll live here — track it live,
         then re-order it in one tap next time.</p>
      <a href="/">Browse kitchens</a>
    </div>`;
    return;
  }

  // running tally
  const spent = hist.reduce((a,h)=>a+(parseInt(h.total_cents)||0),0);
  const kitchens = new Set(hist.map(h=>h.partner).filter(Boolean)).size;
  const t = document.getElementById('tally');
  t.className = 'tally'; t.style.display = 'flex';
  t.innerHTML = `<div><b>${hist.length}</b><span>Orders</span></div>
    <div><b>${money(spent)}</b><span>Into local kitchens</span></div>
    <div><b>${kitchens}</b><span>Kitchen${kitchens===1?'':'s'}</span></div>`;

  let html = '', lastDay = null;
  hist.forEach(h=>{
    const dl = dayLabel(h.at);
    if(dl !== lastDay){ html += `<div class="date">${esc(dl)}</div>`; lastDay = dl; }
    const live = isLive(h.at);
    const nm = h.partnerName || h.partner || 'GateWay order';
    const reHref = h.partner ? `/order?partner=${encodeURIComponent(h.partner)}&reorder=1` : '/order';
    html += `<div class="card">
      <div class="otop">
        <div>
          <div class="oname">${esc(nm)}</div>
          <div class="ooid">${esc(h.oid)}${h.at?` · ${esc(timeLabel(h.at))}`:''}</div>
        </div>
        <span class="ostat ${live?'live':'done'}">${live?'Live':'Delivered'}</span>
      </div>
      <div class="ometa">
        <div class="ott">${money(h.total_cents)}<small>${live?'On the way':'Order total'}</small></div>
        <div class="acts">
          <a class="btn re" href="${reHref}">Re-order</a>
          <a class="btn track" href="/track/${encodeURIComponent(h.oid)}">${live?'Track live':'View'}</a>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}
render();
</script>
<script src="/static/gw-nav.js" defer></script>
</body>
</html>
