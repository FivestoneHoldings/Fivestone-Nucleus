<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateWay — Command Board</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2c4a9e">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--paper:#0b1020;--card:#121a30;--line:#263252;--green:#6fa0ff;--amber:#f0a04b;--txt:#e8e6e1;--dim:#7a7f87}
*{box-sizing:border-box;margin:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--txt);padding:16px 14px 60px}
.mark{font-weight:800;font-size:1.2rem;margin-bottom:2px}.mark span{color:#e03131}
.sub{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.stats{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:86px;flex-shrink:0}
.stat b{display:block;font-size:1.25rem;color:var(--green)}
.stat span{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;border:1px solid var(--line);
background:var(--card);color:var(--dim);font-weight:800;font-size:.82rem;cursor:pointer}
.tab.on{background:#14213d;color:var(--green);border-color:#2c4a9e}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.oid{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--dim)}
.chip{float:right;font-family:'IBM Plex Mono',monospace;font-size:.62rem;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.chip.received{background:#263252;color:#b9bec6}.chip.confirmed{background:#173042;color:#6db3e8}
.chip.assigned{background:#241a38;color:#a98be0}.chip.in_transit{background:#3a2a12;color:var(--amber)}
.chip.delivered{background:#14213d;color:var(--green)}.chip.failed{background:#3a1512;color:#e07b6d}
.chip.active{background:#14213d;color:var(--green)}.chip.on_shift{background:#3a2a12;color:var(--amber)}.chip.inactive{background:#263252;color:var(--dim)}
.line{font-size:.85rem;margin:6px 0;color:#c9cdd3}
.line b{color:var(--dim);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;margin-right:6px}
.row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
select,input,button{padding:10px;border-radius:8px;border:1px solid var(--line);font-family:'Archivo';font-size:.85rem}
select,input{flex:1;background:#0e1526;color:var(--txt);min-width:120px}
button{background:#2f6fe0;color:#ffffff;font-weight:800;border:none;cursor:pointer}
button.ghost{background:transparent;color:#6db3e8;border:1px solid #274257}
button.warn{background:transparent;color:#e07b6d;border:1px solid #4a2622}
.empty{text-align:center;color:var(--dim);padding:40px 12px}
.ev{font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:9px 4px;border-bottom:1px solid var(--line);line-height:1.6;word-break:break-word}
.ev b{color:var(--green)}.ev span{color:var(--dim)}
.copy{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:#6db3e8;cursor:pointer;text-decoration:underline}

/* ===== GateWay design core v0.26 ===== */
*{-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:contain}
.gw-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#0e1526;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));box-shadow:0 1px 0 #1d2946}
.gw-bar img{height:34px;display:block}
.gw-bar .surf{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8b93a7;
text-transform:uppercase;letter-spacing:.14em}
.gw-dash{display:inline-flex;gap:3px;vertical-align:middle}
.gw-dash i{width:14px;height:5px;border-radius:2px;transform:skewX(-18deg)}
.gw-dash i:nth-child(1){background:#2f6fe0}.gw-dash i:nth-child(2){background:#e8eaf0}.gw-dash i:nth-child(3){background:#d81f2a}
button, .tile, a{transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease}
button:active{transform:scale(.97)}
:focus-visible{outline:3px solid #2f6fe0;outline-offset:2px;border-radius:8px}
.skel{background:linear-gradient(100deg,#18213a 40%,#1f2a48 50%,#18213a 60%);background-size:200% 100%;
animation:gwsh 1.2s infinite linear;border-radius:14px}
@keyframes gwsh{to{background-position:-200% 0}}
body{padding-top:76px !important}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.card{border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.28)}
.stat{border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.22)}
.tabs .tab{border-radius:10px}
.tab.on{box-shadow:0 4px 14px rgba(47,111,224,.25)}
button{border-radius:11px}
select,input{border-radius:11px}
.chip{font-weight:500}

.card{padding:16px}
.line{font-size:.87rem;margin:7px 0}
.line b{font-size:.64rem;letter-spacing:.09em}
.oid{letter-spacing:.04em}
.chip{letter-spacing:.05em}

/* v0.49 viewport guard — nothing may exceed the phone's width */
html,body{max-width:100%;overflow-x:hidden}
img,svg,video{max-width:100%;height:auto}
*{min-width:0}
.gw-bar{box-sizing:border-box;max-width:100vw}
.catnav{max-width:100%}
pre,code{white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<div class="gw-bar"><img src="/static/logo-bar.png" alt="GateWay Dispatch">
<span class="surf">Command <span class="gw-dash"><i></i><i></i><i></i></span></span></div>

<div class="mark" style="display:none">GateWay <span>Command Board</span></div>
<div class="sub">Live · Fivestone infrastructure</div>
<div class="stats" id="stats"></div>
<div style="margin:-6px 0 12px"><a id="csvLink" href="#" style="font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:#6db3e8;text-decoration:underline">⬇ export today (CSV)</a>
<span class="copy" style="margin-left:14px" onclick="toggleTrend()">📈 7-day trend</span></div>
<div id="trend" style="display:none;margin-bottom:12px"></div>
<div class="tabs">
  <div class="tab on" id="t-orders" onclick="show('orders')">Orders</div>
  <div class="tab" id="t-drivers" onclick="show('drivers')">Drivers</div>
  <div class="tab" id="t-partners" onclick="show('partners')">Partners</div>
  <div class="tab" id="t-log" onclick="show('log')">Log</div>
</div>
<div id="orders-tab">
  <div class="row" style="margin-bottom:12px">
    <input id="findOrd" placeholder="Find order: ORD-XXXXXXXX" autocapitalize="characters" style="font-family:'IBM Plex Mono',monospace">
    <button onclick="findOrder()">Find</button>
  </div>
  <div id="dayopen"></div>
  <button onclick="showReadiness()" style="width:100%;margin-bottom:8px;background:transparent;border:1.5px solid #263252;color:#8b93a7;padding:11px;font-size:.8rem;box-shadow:none">🚦 Launch readiness</button>
  <div id="readyPanel" style="display:none;margin-bottom:12px"></div>
  <button onclick="showInbox()" id="inboxBtn" style="width:100%;margin-bottom:8px;background:transparent;border:1.5px solid #263252;color:#8b93a7;padding:11px;font-size:.8rem;box-shadow:none">📥 Inbox — who raised their hand</button>
  <div id="inboxPanel" style="display:none;margin-bottom:12px"></div>
  <button onclick="phoneOrder()" style="width:100%;margin-bottom:12px;background:linear-gradient(135deg,#2f6fe0,#16337a);padding:13px">📞 Take a phone order</button>
  <div id="filters" style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px"></div>
  <div id="orderDetail"></div>
  <div id="orders"><div class="skel" style="height:118px;margin-bottom:12px"></div><div class="skel" style="height:118px;margin-bottom:12px"></div><div class="skel" style="height:118px;opacity:.6"></div></div>
</div>
<div id="drivers" style="display:none"></div>
<div id="partners" style="display:none"></div>
<div id="log" style="display:none"></div>
<script src="/static/gw-ui.js"></script>
<script>
const key = location.pathname.split('/').filter(Boolean).pop();
const api = p => `/api/board/${key}` + p;
let DRIVERS = [], VIEW = 'orders';
function esc(x){ const d=document.createElement('div'); d.textContent=x||''; return d.innerHTML; }

function show(v){
  VIEW = v;
  for(const x of ['orders','drivers','partners','log']){
    const el = document.getElementById(x==='orders'?'orders-tab':x);
    el.style.display = x===v?'':'none';
    document.getElementById('t-'+x).classList.toggle('on', x===v);
  }
  if(v==='drivers') loadDrivers();
  if(v==='partners') loadPartners();
  if(v==='log') loadLog();
}

async function loadPartners(){
  const d = await (await fetch(api('/partners'))).json();
  window.__PARTNERS = {};
  (d.partners||[]).forEach(p => { window.__PARTNERS[p.code] = p; });
  document.getElementById('partners').innerHTML = `
    <div class="card"><div class="line"><b>Add / update partner</b></div>
      <div class="row"><input id="pCode" placeholder="code (e.g. asiacafe)">
      <input id="pName" placeholder="Display name"></div>
      <div class="row"><button onclick="addPartner()">Save +</button></div></div>` +
    d.partners.map(x=>`
    <div class="card">
      <span class="chip ${x.status==='active'?'active':'assigned'}">${x.status}</span>
      <div class="oid">${x.code}</div>
      <div class="line" style="font-weight:600">${x.display_name}</div>
      <div class="line"><b>Address</b>${x.address||'—'}</div>
      <div class="line"><b>Delivery fee</b>$${((x.delivery_fee_cents||0)/100).toFixed(2)}</div>
      <div class="row"><input id="pa-${x.code}" placeholder="Pickup address" value="${(x.address||'').replace(/"/g,'&quot;')}">
        <input id="pf-${x.code}" placeholder="Fee $" style="max-width:76px" value="${((x.delivery_fee_cents||0)/100).toFixed(2)}">
        <button class="ghost" onclick="savePartnerMeta('${x.code}')">Save</button></div>
      <div class="line" style="margin-top:10px"><b>Customer order page</b></div>
      <div class="row">
        <button class="ghost" onclick="openLink('/order?partner=${x.code}')">Open ↗</button>
        <button class="ghost" onclick="shareLink('Order from ${esc(x.display_name)} — GateWay Delivery','/order?partner=${x.code}')">Share / copy</button>
      </div>
      <div class="line"><b>Kitchen screen</b> <span class="oid">(the restaurant's dinging orders tablet)</span></div>
      <div class="row">
        <button onclick="openLink('/kitchen/${x.portal_token}')">Open ↗</button>
        <button class="ghost" onclick="shareLink('${esc(x.display_name)} — your GateWay Kitchen Screen','/kitchen/${x.portal_token}')">Share / copy</button>
      </div>
      <div class="row"><button class="${x.accepting_orders?'warn':''}" onclick="setAccepting('${x.code}',${!x.accepting_orders})">${x.accepting_orders?'Pause orders ⏸':'Resume orders ▶'}</button></div>
      <div class="row"><button class="ghost" onclick="toggleMenu('${x.code}')">Menu ▸</button>
        <button class="ghost" onclick="showDigest('${x.code}')">7-day ▸</button>
        <button class="ghost" onclick="openLink(api('/statement/${x.code}').replace(location.origin,''))">Statement ↗</button></div>
      <div class="row">
        <button class="${x.__live===false?'warn':'ghost'}" onclick="goLive('${x.code}')">🚦 Go-live check</button>
        <button class="ghost" onclick="editBrand('${x.code}')">🎨 Brand ✎</button></div>
      <div id="golive-${x.code}" style="display:none;margin-top:8px"></div>
      <div class="row">
        <button class="ghost" onclick="demoOrder('${x.code}')">＋ Demo order</button>
        <button class="ghost" onclick="editThanks('${x.code}',${JSON.stringify(x.thank_you_note||'')})">Thank-you ✎</button>
        <button class="ghost" onclick="editAbout('${x.code}',${JSON.stringify(x.about_blurb||'')})">Story ✎</button>
        <button class="ghost" onclick="editHero('${x.code}',${JSON.stringify(x.hero_url||'')})">Hero photo ✎</button>
        <button class="ghost" onclick="showPhotos('${x.code}')">📷 Photos</button></div>
      <div id="photos-${x.code}" style="display:none;margin-top:8px"></div>
      <div id="digest-${x.code}" style="display:none;margin-top:8px"></div>
      <div id="menu-${x.code}" style="display:none;margin-top:10px"></div>
    </div>`).join('');
}
async function addPartner(){
  const code = document.getElementById('pCode').value.trim();
  const name = document.getElementById('pName').value.trim();
  if(!code || !name) return;
  if(await post('/partners',{code, display_name:name})) loadPartners();
}
/* --- GO-LIVE (v1.1) --- A merchant can sit in the registry for weeks, invisible
   to every customer, and nobody knows why. This says exactly what's blocking them.
   It is the difference between "Asia Cafe is onboarded" and "Asia Cafe can take
   an order Monday." --- */
async function goLive(code){
  const el = document.getElementById('golive-' + code);
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  el.innerHTML = '<div class="skel" style="height:80px"></div>';
  try{
    const d = await (await fetch(api(`/partners/${code}/go-live`))).json();
    el.innerHTML = `<div class="card" style="margin:0">
      <div style="font-weight:900;margin-bottom:10px;color:${d.visible_to_customers?'#57c68f':'#f0a04b'}">
        ${d.visible_to_customers
          ? '✓ LIVE — customers can order from them right now'
          : `⚠ HIDDEN from customers — ${d.blocking.length} thing${d.blocking.length===1?'':'s'} left`}</div>
      ${(d.checks||[]).map(c=>`
        <div style="padding:7px 0;border-bottom:1px solid #1e2942">
          <div style="display:flex;gap:8px;align-items:baseline">
            <span style="color:${c.ok?'#57c68f':(c.blocking?'#d81f2a':'#f0a04b')};font-weight:900">
              ${c.ok?'✓':(c.blocking?'✕':'○')}</span>
            <span style="color:#e8eaf0;font-size:.84rem;font-weight:${c.blocking?'800':'600'}">${esc(c.label)}</span>
            ${!c.blocking && !c.ok ? '<span style="color:#5f6a85;font-size:.66rem;margin-left:auto">optional</span>' : ''}
          </div>
          ${!c.ok?`<div style="color:#8b93a7;font-size:.76rem;margin-top:3px;padding-left:20px;line-height:1.4">${esc(c.fix)}</div>`:''}
        </div>`).join('')}
      <div class="row" style="margin-top:10px">
        <button class="ghost" onclick="openLink('${d.order_link}')">Customer page ↗</button>
        <button class="ghost" onclick="openLink('${d.kitchen_link}')">Kitchen screen ↗</button>
      </div>
    </div>`;
  }catch(e){
    el.innerHTML = '<div class="card" style="margin:0;color:#f0a04b">Could not run the check.</div>';
  }
}

async function editBrand(code){
  const cur = (window.__PARTNERS||{})[code] || {};
  const cuisine = await gwPrompt({title:'Category', body:'Which chip should they appear under? (Burgers, BBQ, Pizza, Asian, Breakfast, Coffee, Mexican, Desserts, Healthy)', value: cur.cuisine||'', confirm:'Next'});
  if(cuisine === null) return;
  const tagline = await gwPrompt({title:'Tagline', body:'One line telling a neighbor why to eat here.', value: cur.tagline||'', confirm:'Next'});
  if(tagline === null) return;
  const color = await gwPrompt({title:'Brand color', body:'Hex color for their splash screen and tile, e.g. #c0392b', value: cur.brand_color||'#16337a', confirm:'Save'});
  if(color === null) return;
  const ok = await post('/partners', {code, display_name: cur.display_name || code,
                                      cuisine, tagline, brand_color: color});
  if(ok){ gwToast('Brand saved ✓', true); loadPartners(); }
}

async function toggleMenu(code){
  const el = document.getElementById('menu-'+code);
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  const d = await (await fetch(api(`/partners/${code}/menu`))).json();
  const rows = (d.categories||[]).map(c =>
    `<div class="line" style="margin-top:8px"><b>${c.name}</b></div>` +
    c.items.map(i => `
      <div class="row" style="align-items:center">
        <span style="flex:2;font-size:.82rem;${i.available?'':'opacity:.4;text-decoration:line-through'}">${i.name}</span>
        <span class="oid copy" style="flex:0" onclick="menuPrice('${code}','${i.id}',${i.price_cents})">$${(i.price_cents/100).toFixed(2)} ✎</span>
        <span class="oid copy" style="flex:0" onclick="menuPhoto('${code}','${i.id}',${JSON.stringify(i.image_url||'')})">${i.image_url?'📷':'📷+'}</span>
        <button class="ghost" style="padding:6px 10px" onclick="menuAvail('${code}','${i.id}',${!i.available})">${i.available?'86':'restore'}</button>
        <button class="warn" style="padding:6px 10px" onclick="menuDel('${code}','${i.id}')">✕</button>
      </div>`).join('')).join('');
  el.innerHTML = rows + `
    <div class="line" style="margin-top:10px"><b>Add item</b></div>
    <div class="row"><input id="mn-${code}" placeholder="Name">
      <input id="mp-${code}" placeholder="9.99" style="max-width:80px"></div>
    <div class="row"><input id="mc-${code}" placeholder="Category">
      <button onclick="menuAdd('${code}')">Add +</button></div>`;
}
async function menuAdd(code){
  const name = document.getElementById('mn-'+code).value.trim();
  const price = Math.round(parseFloat(document.getElementById('mp-'+code).value||'0')*100);
  const cat = document.getElementById('mc-'+code).value.trim() || 'Menu';
  if(!name) return;
  if(await post(`/partners/${code}/menu`, {name, price_cents:price, category:cat}))
    { document.getElementById('menu-'+code).style.display='none'; toggleMenu(code); }
}
async function menuPrice(code, id, current){
  const v = await gwPrompt({title:'New price', value:(current/100).toFixed(2), inputmode:'decimal', confirm:'Save price'});
  if(v === null) return;
  const cents = Math.round(parseFloat(v)*100);
  if(isNaN(cents) || cents < 0) return gwToast('Enter a valid price.', false);
  if(await post(`/partners/${code}/menu`, {id, price_cents: cents}))
    { document.getElementById('menu-'+code).style.display='none'; toggleMenu(code); }
}
async function menuPhoto(code, id, current){
  const url = await gwPrompt({title:'Item photo', value: current, multiline:true,
    placeholder:'https://…', confirm:'Save photo',
    body:'Direct https:// link to a photo of THIS dish (restaurant-owned). Blank removes it.'});
  if(url === null) return;
  if(await post(`/partners/${code}/menu`, {id, image_url: url})){
    gwToast(url ? 'Photo saved ✓' : 'Photo removed');
    document.getElementById('menu-'+code).style.display='none'; toggleMenu(code);
  }
}
async function menuAvail(code, id, avail){
  if(await post(`/partners/${code}/menu`, {id, available:avail}))
    { document.getElementById('menu-'+code).style.display='none'; toggleMenu(code); }
}
async function menuDel(code, id){
  if(!await gwConfirm({title:'Remove this item?', body:'It disappears from the menu immediately. You can add it back later.',
    confirm:'Remove', danger:true})) return;
  const r = await fetch(api(`/menu-items/${id}`), {method:'DELETE'});
  if(r.ok){ document.getElementById('menu-'+code).style.display='none'; toggleMenu(code); }
}
async function showDigest(code){
  const el = document.getElementById('digest-'+code);
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  const d = await (await fetch(api(`/digest?partner=${code}`))).json();
  el.innerHTML = d.days.length ? d.days.map(x=>
    `<div class="ev"><b>${x.date}</b> · ${x.orders} orders · ${x.delivered} delivered · $${(x.revenue_cents/100).toFixed(2)}</div>`).join('') +
    `<div class="ev" style="color:#6fa0ff"><b>7-DAY TOTAL</b> · ${d.totals.orders} orders · $${(d.totals.revenue_cents/100).toFixed(2)}</div>`
    : '<div class="ev">No orders in the last 7 days.</div>';
}
async function savePartnerMeta(code){
  const address = document.getElementById('pa-'+code).value.trim();
  const fee = Math.round(parseFloat(document.getElementById('pf-'+code).value||'0')*100);
  const cur = (await (await fetch(api('/partners'))).json()).partners.find(p=>p.code===code);
  if(await post('/partners', {code, display_name: cur?cur.display_name:code,
      address, delivery_fee_cents: fee})) loadPartners();
}
function openLink(path){ window.open(location.origin + path, '_blank'); }
async function shareLink(title, path){
  const url = location.origin + path;
  if(navigator.share){
    try{ await navigator.share({title, url}); return; }catch(e){ if(e.name==='AbortError') return; }
  }
  navigator.clipboard.writeText(url);
  gwToast('Link copied — paste it into a text.');
}
function copyKitchen(tok){
  navigator.clipboard.writeText(location.origin + '/kitchen/' + tok);
  gwToast('Kitchen link copied — send it to the restaurant.');
}
async function demoOrder(code){
  const r = await fetch(api(`/partners/${code}/demo-order`), {method:'POST'});
  if(r.ok){ const d = await r.json();
    gwToast(`Demo order ${d.order_id} placed — $${(d.total_cents/100).toFixed(2)}`); load(); }
  else gwToast('Demo order failed.', false);
}
async function editThanks(code, current){
  const note = await gwPrompt({title:'Thank-you note from this kitchen', multiline:true,
    value: current, placeholder:'Thanks for supporting our family kitchen! — Stephen',
    confirm:'Save note', body:'Customers see this on their delivered screen. Their food, their neighborhood, their kitchen\'s own words.'});
  if(note === null) return;
  const r = await fetch(api(`/partners/${code}/thanks`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({note})});
  if(r.ok){ gwToast('Note saved ✓'); loadPartners(); }
}
async function showPhotos(code){
  const el = document.getElementById('photos-'+code);
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  const d = await (await fetch(api('/photo-coverage'))).json();
  const p = (d.partners||[]).find(x=>x.code===code);
  if(!p){ el.innerHTML = '<div class="ev">No data.</div>'; return; }
  const bar = `<div style="height:8px;border-radius:5px;background:#263252;overflow:hidden;margin:6px 0 10px">
    <div style="height:100%;width:${p.pct}%;background:${p.pct>=80?'#57c68f':p.pct>=40?'#f0a04b':'#e03131'}"></div></div>`;
  el.innerHTML = `<div class="ev" style="border:none">
      <b>${p.items_with_photo}/${p.items}</b> dishes have photos (${p.pct}%) · hero: ${p.hero?'✓':'—'}</div>
    ${bar}` +
    (p.missing_sample.length
      ? p.missing_sample.map(i=>`<div class="ev" style="border:none;padding:3px 0">
          <span class="copy" onclick="itemPhoto('${code}','${i.id}')">${esc(i.name)} — add photo ✎</span></div>`).join('')
      : '<div class="ev" style="border:none;color:#57c68f">Every dish has a photo ✓</div>');
}
async function itemPhoto(code, id){
  const url = await gwPrompt({title:'Photo for this dish', placeholder:'https://…',
    confirm:'Save photo', body:'Paste a link to the restaurant\'s own photo of this dish (their site, Facebook, or Instagram).'});
  if(!url) return;
  const r = await fetch(api(`/partners/${code}/menu`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, image_url: url})});
  if(r.ok){ gwToast('Photo saved ✓'); document.getElementById('photos-'+code).style.display='none'; showPhotos(code); }
  else gwToast('Must be an https:// link', false);
}
async function editHero(code, current){
  const url = await gwPrompt({title:'Kitchen hero photo', value: current, multiline:true,
    placeholder:'https://…  (a direct link to their own food photo)',
    confirm:'Save photo', body:'Paste a direct https:// image link the restaurant owns (their site, their Facebook/Instagram photo). Leave blank to remove.'});
  if(url === null) return;
  const r = await fetch(api(`/partners/${code}/hero`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({url})});
  if(r.ok){ gwToast('Hero photo saved ✓'); loadPartners(); }
  else gwToast('Must be an https:// link.', false);
}
async function editAbout(code, current){
  const blurb = await gwPrompt({title:'This kitchen\'s story', multiline:true, value: current,
    placeholder:'Family-owned since 1998. Hand-tossed dough, sauce from Nonna\'s recipe.',
    confirm:'Save story', body:'Shown to customers while they wait for a driver. A sentence or two about who they are.'});

async function setAccepting(code, on){

}
function copyOrderLink(code){
  navigator.clipboard.writeText(location.origin + '/order?partner=' + code);
  gwToast('Order link copied — send it to the partner.');
}

async function editField(recordId, field, current){
  const labels = {pickup_address:'Pickup address', dropoff_address:'Dropoff address',
    items_description:'Items', special_instructions:'Notes', customer_phone_raw:'Customer phone'};
  const v = await gwPrompt({title:'Edit ' + (labels[field]||field), value: current, confirm:'Save'});
  if(v === null || v === current) return;
  const r = await fetch(api(`/orders/${recordId}/edit`), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({[field]: v})});
  if(r.ok){ gwToast('Saved ✓'); findOrder(); load(); } else gwToast('Edit failed.', false);
}
async function toggleTrend(){
  const el = document.getElementById('trend');
  if(el.style.display !== 'none'){ el.style.display='none'; return; }
  el.style.display = '';
  const d = await (await fetch(api('/digest'))).json();
  const max = Math.max(1, ...d.days.map(x=>x.orders));
  el.innerHTML = d.days.length ? d.days.map(x=>
    `<div style="display:flex;align-items:center;gap:8px;margin:3px 0">
      <span class="oid" style="width:70px">${x.date.slice(5)}</span>
      <div style="height:12px;border-radius:6px;background:#2f6fe0;width:${Math.round(x.orders/max*60)}%;min-width:4px"></div>
      <span class="oid">${x.orders} · $${(x.revenue_cents/100).toFixed(0)}</span>
    </div>`).join('') +
    `<div class="ev" style="color:#6fa0ff;border:none"><b>WEEK</b> · ${d.totals.orders} orders · ${d.totals.delivered} delivered · $${(d.totals.revenue_cents/100).toFixed(2)}</div>`
    : '<div class="empty" style="padding:12px">No orders this week.</div>';
}
async function findOrder(){
  let v = document.getElementById('findOrd').value.trim().toUpperCase();
  if(!v) { document.getElementById('orderDetail').innerHTML=''; return; }
  if(!v.startsWith('ORD-') && v.length===8) v = 'ORD-' + v;
  const r = await fetch(api('/order-detail/' + encodeURIComponent(v)));
  const box = document.getElementById('orderDetail');
  if(!r.ok){ box.innerHTML = `<div class="card"><div class="empty" style="padding:14px">No order found for ${v}.</div></div>`; return; }
  const d = await r.json(); const f = d.fields;
  const stampRow = (label, val) => val?`<div class="line"><b>${label}</b><span style="font-family:'IBM Plex Mono',monospace;font-size:.72rem">${val.replace('T',' ').slice(0,19)} UTC</span></div>`:'';
  box.innerHTML = `<div class="card" style="border-color:#2c4a9e">
    <span class="chip ${f.status}">${(f.status||'').replace('_',' ')}</span>
    <div class="oid">${f.order_id}</div>
    ${f.partner_code?`<div class="line"><b>Partner</b>${f.partner_code}</div>`:''}
    ${f.customer_name_raw?`<div class="line"><b>Customer</b>${esc(f.customer_name_raw)} ${f.customer_phone_raw||''}</div>`:''}
    <div class="line"><b>Pickup</b>${esc(f.pickup_address)||'—'}</div>
    <div class="line"><b>Drop</b>${esc(f.dropoff_address)||'—'} ${f.dropoff_contact_name?('· '+f.dropoff_contact_name):''}</div>
    ${f.items_description?`<div class="line"><b>Items</b>${esc(f.items_description)}</div>`:''}
    ${f.special_instructions?`<div class="line"><b>Notes</b>${esc(f.special_instructions)}</div>`:''}
    ${f.cancel_reason?`<div class="line"><b>Cancel reason</b>${esc(f.cancel_reason)}</div>`:''}
    ${stampRow('Received', f.received_at)}${stampRow('Confirmed', f.confirmed_at)}
    ${stampRow('Assigned', f.assigned_at)}${stampRow('Picked up', f.in_transit_at)}
    ${stampRow('Delivered', f.delivered_at)}${stampRow('Closed', f.closed_at)}
    ${stampRow('Cancelled', f.cancelled_at)}${stampRow('Failed', f.failed_at)}
    ${d.has_proof?`<div class="line"><b>Proof</b><a href="/proof/${f.order_id}" target="_blank" style="color:#6fa0ff">📷 view photo</a></div>`:''}
    ${d.events.length?`<div class="line" style="margin-top:10px"><b>Event trail</b></div>` +
      d.events.map(e=>`<div class="ev"><b>${e.event_type}</b> <span>· ${e.actor} · ${e.occurred_at.replace('T',' ').slice(0,19)} UTC</span></div>`).join(''):''}
    <div class="row"><button class="ghost" onclick="document.getElementById('orderDetail').innerHTML='';document.getElementById('findOrd').value=''">Close ✕</button></div>
  </div>`;
}
function paintStats(d){
  try{
    if(!d) return;
    const avg = d.avg_received_to_delivered_min;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><b>${d.orders_today}</b><span>orders today</span></div>
      <div class="stat"><b>${d.delivered_today}</b><span>delivered</span></div>
      <div class="stat"><b>${avg!=null?avg+'m':'—'}</b><span>avg door-to-door</span></div>
      <div class="stat"><b>${(d.by_status||{}).in_transit||0}</b><span>on the road</span></div>` +
      Object.entries(d.by_partner||{}).map(([p,n])=>
        `<div class="stat"><b>${n}</b><span>${p}</span></div>`).join('');
  }catch(e){}
}

async function load(){
  const r = await fetch(api('/snapshot'));
  if(!r.ok){
    let detail=''; try{ detail=(await r.json()).detail||''; }catch(e){}
    document.getElementById('orders').innerHTML =
      `<div class="empty">Bad board key.<br><span style="font-size:.62rem;opacity:.55">HTTP ${r.status} ${detail}</span></div>`;
    return;
  }
  const d = await r.json(); DRIVERS = d.drivers; SNAP = d.orders;
  paintFilters();
  renderOrders();
  paintStats(d.stats);
  maybeDayOpen();
}

async function phoneOrder(){
  const parts = await (await fetch('/v0/partners')).json();
  const list = (parts.partners||[]).map(p=>`${p.code} — ${p.display_name}`).join('\n');
  const partner = await gwPrompt({title:'Which kitchen?', placeholder:'burgerboys',
    confirm:'Next', body:'Type the kitchen code:\n\n' + list + '\n\n(Leave blank for a custom courier run.)'});
  if(partner === null) return;
  const items = await gwPrompt({title:'What are they ordering?', multiline:true,
    placeholder:'1× Kobe Burger, 1× Mac & Cheese', confirm:'Next',
    body:'Type it as you would read it back to them.'});
  if(!items) return;
  const subtotal = await gwPrompt({title:'Food subtotal ($)', inputmode:'decimal',
    placeholder:'17.50', confirm:'Next', body:'Just the food — the delivery fee is added automatically.'});
  if(subtotal === null) return;
  const address = await gwPrompt({title:'Delivery address', multiline:true,
    placeholder:'123 Elm St, Knoxville TN', confirm:'Next'});
  if(!address) return;
  const name = await gwPrompt({title:'Their name', placeholder:'Ruth', confirm:'Next'});
  if(name === null) return;
  const phone = await gwPrompt({title:'Their phone', inputmode:'tel',
    placeholder:'865-555-0100', confirm:'Next', body:'So they get delivery texts. Leave blank if they prefer not to.'});
  if(phone === null) return;
  const tip = await gwPrompt({title:'Tip for the driver ($)', inputmode:'decimal',
    placeholder:'0.00', confirm:'Place the order', body:'Cash tips at the door are fine too — leave blank.'});
  if(tip === null) return;
  const payload = {
    partner: (partner||'').trim(), items, address, name, phone,
    subtotal_cents: Math.round(parseFloat(subtotal||'0')*100) || 0,
    tip_cents: Math.round(parseFloat(tip||'0')*100) || 0,
    payment_method: 'cod',
  };
  const r = await fetch(api('/phone-order'), {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
  if(r.ok){
    const d = await r.json();
    gwToast(`${d.order_id} placed · $${(d.total_cents/100).toFixed(2)} (cash at door)`);
    load();
  } else gwToast('Could not place the order.', false);
}

let SNAP = [], FILTER = 'all';

// ---- Day open: yesterday's scorecard + carryover, once per day ----
function todayStr(){ return new Date().toISOString().slice(0,10); }
async function maybeDayOpen(){
  const key = 'gw_dayopen_' + todayStr();
  try{ if(localStorage.getItem(key)) return; }catch(e){ return; }
  if(document.getElementById('dayopenCard')) return;
  const y = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  let sum = null;
  try{ sum = await (await fetch(api('/summary?date=' + y))).json(); }catch(e){}
  const carry = SNAP.filter(o => (o.received_at||'').slice(0,10) < todayStr());
  const deliveredOpen = carry.filter(o => o.status === 'delivered');
  if((!sum || !sum.orders) && !carry.length){ try{ localStorage.setItem(key,'1'); }catch(e){} return; }
  const yLine = sum && sum.orders
    ? `Yesterday: <b>${sum.orders}</b> orders · <b>${sum.delivered}</b> delivered · <b>$${(sum.revenue_cents/100).toFixed(2)}</b>${sum.avg_minutes?` · avg ${sum.avg_minutes}m`:''}`
    : 'No orders yesterday.';
  const carryHtml = carry.length
    ? `<div style="margin-top:8px">Carryover needing attention:</div>` +
      carry.slice(0,6).map(o=>`<div class="ev" style="border:none;padding:4px 0">
        <span class="copy" onclick="jumpTo('${esc(o.order_id)}')">${esc(o.order_id)}</span>
        <span>· ${esc(o.status)}${o.partner?` · ${esc(o.partner)}`:''}</span></div>`).join('') +
      (carry.length > 6 ? `<div class="ev" style="border:none;padding:4px 0"><span>…and ${carry.length-6} more</span></div>` : '')
    : `<div style="margin-top:8px;color:#57c68f">Board carried nothing over. Clean start. ✓</div>`;
  document.getElementById('dayopen').innerHTML = `
    <div class="card" id="dayopenCard" style="border-left:4px solid #6fa0ff">
      <div style="font-weight:800;margin-bottom:6px">☀️ Day open</div>
      <div style="font-size:.85rem">${yLine}</div>
      ${carryHtml}
      <div class="row" style="margin-top:10px">
        ${deliveredOpen.length?`<button onclick="closeAllDelivered()">Close ${deliveredOpen.length} delivered ✓</button>`:''}
        <button class="ghost" onclick="dismissDayOpen()">Got it ✓</button>
      </div>
    </div>`;
}
function jumpTo(oid){
  document.getElementById('findOrd').value = oid;
  findOrder();
  window.scrollTo({top:0, behavior:'smooth'});
}
function dismissDayOpen(){
  try{ localStorage.setItem('gw_dayopen_' + todayStr(), '1'); }catch(e){}
  document.getElementById('dayopen').innerHTML = '';
}
async function closeAllDelivered(){
  const targets = SNAP.filter(o => o.status === 'delivered'
    && (o.received_at||'').slice(0,10) < todayStr());
  if(!targets.length) return;
  if(!await gwConfirm({title:`Close ${targets.length} delivered order${targets.length>1?'s':''}?`,
    body:'They move to the permanent ledger and leave the board.', confirm:'Close all'})) return;
  let ok = 0;
  for(const o of targets){ if(await post(`/orders/${o.id}/close`)) ok++; }
  gwToast(`Closed ${ok} of ${targets.length} ✓`);
  dismissDayOpen();
  load();
}
const FILTERS = [
  ['all','All', o=>true],
  ['action','⚠ Action', o=>['failed','received'].includes(o.status)],
  ['cooking','Cooking', o=>['confirmed','assigned'].includes(o.status)],
  ['road','On road', o=>o.status==='in_transit'],
  ['done','Done', o=>o.status==='delivered'],
];
function paintFilters(){
  document.getElementById('filters').innerHTML = FILTERS.map(([k,label,fn])=>{
    const n = SNAP.filter(fn).length;
    return `<button class="tab ${FILTER===k?'on':''}" style="flex:0 0 auto;padding:8px 13px;font-size:.74rem"
      onclick="FILTER='${k}';paintFilters();renderOrders()">${label}${n?` ${n}`:''}</button>`;
  }).join('');
}
function ageChip(o){
  if(!o.received_at || ['delivered','in_transit'].includes(o.status)) return '';
  const m = Math.round((Date.now() - new Date(o.received_at).getTime())/60000);
  if(isNaN(m) || m < 0) return '';
  const col = m >= 20 ? '#e03131' : m >= 10 ? '#f0a04b' : '#7a7f87';
  return `<span style="float:right;margin-right:8px;font-family:'IBM Plex Mono',monospace;
    font-size:.62rem;color:${col};font-weight:700">${m}m</span>`;
}
const URGENCY = {failed:'#e03131', received:'#f0a04b'};
function renderOrders(){
  const list = SNAP.filter(FILTERS.find(f=>f[0]===FILTER)[2]);
  if(!list.length){ document.getElementById('orders').innerHTML =
    `<div class="empty" style="padding:56px 20px"><div class="gw-dash" style="justify-content:center;margin-bottom:16px"><i></i><i></i><i></i></div><div style="font-weight:800;color:#c9cdd3;font-size:1rem">All clear</div><div style="font-size:.82rem;margin-top:4px">No open orders right now. New orders land here the moment they come in.</div></div>`; }
  else document.getElementById('orders').innerHTML = list.map(o => `
    <div class="card" style="${URGENCY[o.status]?`border-left:4px solid ${URGENCY[o.status]}`:''}">
      <span class="chip ${o.status}">${o.status.replace('_',' ')}</span>
      ${ageChip(o)}
      <div class="oid">${o.order_id}${o.partner?` <span style="color:#6fa0ff">· ${esc(o.partner)}</span>`:''}</div>
      ${o.customer?`<div class="line"><b>From</b>${esc(o.customer)}</div>`:''}
      <div class="line"><b>Pickup</b>${esc(o.pickup)||'—'}</div>
      <div class="line"><b>Drop</b>${esc(o.dropoff)||'—'}</div>
      ${o.items?`<div class="line"><b>Items</b>${esc(o.items)}</div>`:''}
      ${o.requested_for?`<div class="line"><b>Scheduled</b><span style="color:#f0a04b;font-weight:700">${esc(o.requested_for).replace('T',' ').slice(0,16)}</span></div>`:''}
      ${o.kitchen_ready?`<div class="line" style="color:#6fa0ff;font-weight:800">🍳 Kitchen: READY</div>`:''}
      ${o.status==='delivered'?`<div class="line"><b>Proof</b><a href="/proof/${o.order_id}" target="_blank" style="color:#6fa0ff">📷 view photo</a></div>`:''}
      <div class="row">
        ${o.status==='received'?`<button class="ghost" onclick="confirmO('${o.id}')">Confirm</button>`:''}
        ${['received','confirmed'].includes(o.status)?`
          <select id="d-${o.id}">${DRIVERS.map(x=>`<option value="${x.id}">${esc(x.name)}${x.active?` (${x.active} active)`:''}</option>`).join('')}</select>
          <button onclick="assign('${o.id}')">Assign →</button>`:''}
        ${o.status==='delivered'?`<button class="ghost" onclick="closeO('${o.id}')">Close ✓</button>`:''}
        ${o.status==='failed'?`<button onclick="requeueO('${o.id}')">Requeue ↻</button>`:''}
        ${o.status!=='delivered'?`<button class="warn" onclick="cancelO('${o.id}')">Cancel</button>`:''}
        ${['assigned','in_transit'].includes(o.status)?`<button class="ghost" onclick="notifyO('${o.id}')">Text update</button>`:''}
      </div>
    </div>`).join('');
}

async function post(path, body){
  const r = await fetch(api(path),{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body||{})});
  if(!r.ok){
    let d=''; try{ d=(await r.json()).detail||''; }catch(e){}
    gwToast(d || 'Action failed — try again.', false);
  }
  return r.ok;
}
async function assign(id){ if(await post(`/orders/${id}/assign`,{driver_id:document.getElementById('d-'+id).value})) load(); }
async function confirmO(id){ if(await post(`/orders/${id}/confirm`)) load(); }
async function closeO(id){ if(await post(`/orders/${id}/close`)) load(); }
async function requeueO(id){ if(await post(`/orders/${id}/requeue`)) load(); }
async function notifyO(id){
  const message = await gwPrompt({title:'Text the customer', multiline:true,
    placeholder:'e.g. Running about 10 minutes late — sorry!', confirm:'Send text'});
  if(!message) return;
  const r = await fetch(api(`/orders/${id}/notify`),{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({message})});
  const d = await r.json().catch(()=>({}));
  gwToast(r.ok ? ('Text ' + (d.sms_status==='sent'?'sent ✓':'recorded ('+(d.sms_status||'queued')+')')) : 'Failed to send.', r.ok);
}
async function cancelO(id){
  const reason = await gwPrompt({title:'Cancel this order', body:'The customer will not be charged or delivered.',
    placeholder:'Reason (optional)', confirm:'Cancel order', cancel:'Keep it', danger:true});
  if(reason===null) return;
  if(await post(`/orders/${id}/cancel`,{reason})){ gwToast('Order cancelled'); load(); }
}

async function loadDrivers(){
  const d = await (await fetch(api('/drivers'))).json();
  document.getElementById('drivers').innerHTML = `
    <div class="card"><div class="line"><b>Add driver</b></div>
      <div class="row"><input id="newDrvName" placeholder="Driver name">
      <button onclick="addDriver()">Add +</button></div></div>` +
    d.drivers.map(x=>`
    <div class="card">
      <span class="chip ${x.status}">${x.status||'—'}</span>
      <div class="oid">${x.driver_id}</div>
      <div class="line" style="font-weight:600">${x.name}</div>
      <div class="line"><b>Day sheet</b> <span class="oid">/driver/${x.day_token}</span></div>
      <div class="row">
        <button class="ghost" onclick="openLink('/driver/${x.day_token}')">Open ↗</button>
        <button class="ghost" onclick="shareLink('Your GateWay Driver Hub link — ${esc(x.name)}','/driver/${x.day_token}')">Share / copy</button>
        <button class="warn" onclick="rotate('${x.id}')">Rotate ↻</button>
      </div>
    </div>`).join('');
}
async function addDriver(){
  const name = document.getElementById('newDrvName').value.trim();
  if(!name) return;
  if(await post('/drivers',{name})) loadDrivers();
}
async function rotate(id){
  if(!await gwConfirm({title:'Rotate day token?', body:'Their old link stops working instantly. Share the new one after.',
    confirm:'Rotate', danger:true})) return;
  if(await post(`/drivers/${id}/rotate`)){ gwToast('Token rotated — share the new link'); loadDrivers(); }
}
function copyLink(tok){
  navigator.clipboard.writeText(location.origin + '/driver/' + tok);
  gwToast('Day-sheet link copied — text it to the driver.');
}

let LOGMODE = 'events';
function relTime(iso){
  const s = Math.round((Date.now() - new Date(iso).getTime())/1000);
  if(isNaN(s)) return '';
  if(s < 60) return 'just now';
  if(s < 3600) return Math.round(s/60) + 'm ago';
  if(s < 86400) return Math.round(s/3600) + 'h ago';
  return Math.round(s/86400) + 'd ago';
}
const EVICON = [['order.kitchen','🍳'],['order.','📦'],['driver.','🚗'],['partner.','🏪'],['system.','⚠️'],['menu.','🍽']];
function evIcon(t){ const hit = EVICON.find(([p])=>t.startsWith(p)); return hit ? hit[1] : '·'; }
const ACTORCOL = a => a.startsWith('kitchen') ? '#f0a04b' : a.startsWith('driver') ? '#57c68f'
  : a === 'system' ? '#e07b6d' : '#6fa0ff';
function editSummary(e){
  if(e.event_type !== 'order.edited') return '';
  try{
    const ch = JSON.parse(e.payload).changed;
    return '<br><span style="color:#8b93a7">' + Object.entries(ch).map(([k,v])=>
      `${esc(k)}: ${esc(String(v.from).slice(0,40))} → ${esc(String(v.to).slice(0,40))}`).join(' · ') + '</span>';
  }catch(err){ return ''; }
}
let LOGDATA = [];
function renderLog(){
  const q = (document.getElementById('logq')?.value || '').toLowerCase();
  const rows = LOGDATA.filter(e =>
    !q || (e.event_type + ' ' + e.entity_ref + ' ' + e.actor).toLowerCase().includes(q));
  document.getElementById('logrows').innerHTML = rows.length
    ? rows.map(e=>`<div class="ev">${evIcon(e.event_type)} <b>${esc(e.event_type)}</b> ${esc(e.entity_ref)}
        <span style="color:${ACTORCOL(e.actor)}">· ${esc(e.actor)}</span>
        <span>· ${relTime(e.occurred_at)}</span>${editSummary(e)}</div>`).join('')
    : '<div class="empty">Nothing matches.</div>';
}
async function loadLog(){
  const toggle = `<div class="tabs" style="margin-bottom:10px">
    <div class="tab ${LOGMODE==='events'?'on':''}" onclick="LOGMODE='events';loadLog()">Events</div>
    <div class="tab ${LOGMODE==='texts'?'on':''}" onclick="LOGMODE='texts';loadLog()">Texts</div></div>`;
  if(LOGMODE==='events'){
    const d = await (await fetch(api('/events'))).json();
    LOGDATA = d.events;
    document.getElementById('log').innerHTML = toggle +
      `<input id="logq" placeholder="Filter: order id, event, actor…" oninput="renderLog()"
        style="width:100%;box-sizing:border-box;margin-bottom:10px;padding:11px;border-radius:11px">` +
      `<div id="logrows"></div>`;
    if(!LOGDATA.length) document.getElementById('logrows').innerHTML = '<div class="empty">The log is empty.</div>';
    else renderLog();
  } else {
    const d = await (await fetch(api('/notifications'))).json();
    document.getElementById('log').innerHTML = toggle + (d.notifications.length
      ? d.notifications.map(n=>`<div class="ev"><b>${esc(n.status)}</b> ${esc(n.order_id)} → ${esc(n.to)}
          <span>· ${relTime(n.at)}</span><br>
          <span>${esc(n.body)}</span>${n.detail?`<br><span style="color:#e07b6d">${esc(n.detail)}</span>`:''}</div>`).join('')
      : '<div class="empty">No texts yet. (SMS engine idles until Twilio is wired.)</div>');
  }
}

document.getElementById('csvLink').href = api('/export.csv');
function netDown(){
  if(document.getElementById('netB')) return;
  const b = document.createElement('div'); b.id = 'netB';
  b.textContent = '⚠ Connection lost — retrying…';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d81f2a;color:#fff;font-weight:800;text-align:center;padding:8px;z-index:99;font-size:.8rem';
  document.body.prepend(b);
}
function netUp(){ const b = document.getElementById('netB'); if(b) b.remove(); }
const _rawLoad = load;
load = async function(){ try { await _rawLoad(); netUp(); } catch(e) { netDown(); } };
load(); setInterval(()=>{ if(VIEW==='orders') load(); }, 60000);
</script>
